<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3. 게임 디자인 / 컨셉 기획 ⭐⭐⭐</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
    --bg-void: #08090d;
    --bg-surface: #0e1019;
    --bg-elevated: #141722;
    --bg-card: #181c2a;
    --bg-glass: rgba(20, 23, 34, 0.75);
    --border-subtle: rgba(255,255,255,0.04);
    --border-dim: rgba(255,255,255,0.08);
    --border-accent: rgba(129,140,248,0.3);
    --text-primary: #eaedf3;
    --text-secondary: #8b95a8;
    --text-muted: #5a6478;
    --accent: #818cf8;
    --accent-glow: rgba(129,140,248,0.15);
    --accent-bright: #a5b4fc;
    --gold: #f0c040;
    --gold-dim: rgba(240,192,64,0.12);
    --green: #6ee7a0;
    --green-dim: rgba(110,231,160,0.1);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.1);
    --radius: 12px;
    --radius-sm: 8px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg-void);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
}

/* 배경 그라디언트 앰비언트 */
body::before {
    content: '';
    position: fixed; inset: 0; z-index: -1;
    background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(129,140,248,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(240,192,64,0.03) 0%, transparent 50%);
}

/* ========== 오디오 바 (Glass Morphism) ========== */
#audio-bar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg-glass);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border-bottom: 1px solid var(--border-subtle);
    padding: 14px 24px;
}
#audio-controls {
    display: flex; align-items: center; gap: 14px;
    max-width: 860px; margin: 0 auto;
}
#play-btn {
    background: var(--accent);
    border: none; color: #fff;
    width: 40px; height: 40px; border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px var(--accent-glow), 0 2px 8px rgba(0,0,0,0.3);
    transition: var(--transition);
    flex-shrink: 0;
}
#play-btn svg { display: block; }
#play-btn:hover {
    background: var(--accent-bright);
    transform: scale(1.08);
    box-shadow: 0 0 30px rgba(129,140,248,0.3), 0 4px 12px rgba(0,0,0,0.4);
}
.skip-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
    flex-shrink: 0;
}
.skip-btn svg { display: block; }
.skip-btn:hover {
    background: var(--surface-hover);
    color: var(--text-primary);
}
#time-display {
    color: var(--text-muted); font-size: 12px;
    min-width: 90px; font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
}

/* 커스텀 시크바 */
#seek-bar {
    flex: 1; height: 4px;
    -webkit-appearance: none; appearance: none;
    background: var(--border-dim);
    border-radius: 2px; outline: none;
    cursor: pointer; transition: height 0.15s ease;
}
#seek-bar:hover { height: 6px; }
#seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
    cursor: pointer;
    transition: var(--transition);
}
#seek-bar::-webkit-slider-thumb:hover {
    transform: scale(1.3);
    box-shadow: 0 0 16px rgba(129,140,248,0.4);
}
#seek-bar::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%; border: none;
    background: var(--accent);
    cursor: pointer;
}

#speed-select {
    background: var(--bg-elevated); color: var(--text-secondary);
    border: 1px solid var(--border-dim);
    border-radius: 6px; padding: 5px 10px;
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    cursor: pointer; outline: none;
    transition: var(--transition);
}
#speed-select:hover { border-color: var(--accent); }

/* ========== 슬라이드 네비게이션 ========== */
#slide-nav {
    display: flex; gap: 3px; padding: 12px 24px;
    overflow-x: auto; background: var(--bg-surface);
    border-bottom: 1px solid var(--border-subtle);
    justify-content: center; flex-wrap: wrap;
    scrollbar-width: none;
}
#slide-nav::-webkit-scrollbar { display: none; }

.nav-dot {
    width: 34px; height: 30px; border-radius: 6px;
    border: 1px solid transparent; cursor: pointer;
    font-size: 11px; font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
    position: relative;
}
.nav-dot.has-audio {
    background: rgba(129,140,248,0.08); color: var(--accent);
    border-color: rgba(129,140,248,0.12);
}
.nav-dot.no-audio {
    background: rgba(255,255,255,0.02); color: var(--text-muted);
    opacity: 0.5;
}
.nav-dot:hover {
    opacity: 1;
    transform: translateY(-1px);
    border-color: var(--accent);
}
.nav-dot.active {
    background: var(--accent); color: #fff;
    transform: translateY(-2px) scale(1.05); opacity: 1;
    box-shadow: 0 4px 16px var(--accent-glow);
    border-color: transparent;
}

/* 슬라이드 전환 애니메이션 */
@keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
}
#slide-content {
    animation: slideIn 0.35s ease-out;
}

#slide-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
#slide-id {
    color: var(--accent); font-size: 11px; letter-spacing: 3px;
    font-weight: 500; text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
}
#slide-badge {
    font-size: 10px; padding: 3px 10px; border-radius: 20px;
    font-weight: 500; letter-spacing: 0.3px;
}
.badge-audio {
    background: var(--green-dim); color: var(--green);
    border: 1px solid rgba(110,231,160,0.15);
}
.badge-no-audio {
    background: var(--red-dim); color: var(--red);
    border: 1px solid rgba(248,113,113,0.12);
}

#slide-title {
    font-size: 26px; font-weight: 900; color: #fff;
    margin-bottom: 32px; line-height: 1.5;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border-dim);
    letter-spacing: -0.3px;
}

/* ========== 슬라이드 콘텐츠 블록 ========== */

.slide-text {
    color: var(--text-secondary); font-size: 14.5px;
    line-height: 2; margin-bottom: 20px;
    font-weight: 300;
}
.slide-text strong {
    color: var(--gold); font-weight: 500;
    background: var(--gold-dim);
    padding: 1px 5px; border-radius: 3px;
}
.slide-text em {
    color: var(--accent-bright); font-style: normal; font-weight: 400;
}

/* 인용 블록 */
.slide-quote {
    background: var(--bg-card);
    border-left: 2px solid var(--accent);
    padding: 18px 22px; margin-bottom: 16px;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    color: var(--text-primary); font-size: 14px;
    line-height: 1.85; font-weight: 300;
}
.slide-quote strong {
    color: var(--gold); font-weight: 500;
}

/* 포인트 리스트 */
.slide-points {
    list-style: none; margin-bottom: 20px; padding-left: 0;
    display: flex; flex-direction: column; gap: 6px;
}
.slide-points li {
    position: relative;
    padding: 12px 16px 12px 36px;
    background: var(--bg-elevated);
    border-radius: var(--radius-sm);
    font-size: 13.5px; line-height: 1.7;
    color: var(--text-secondary); font-weight: 300;
    border: 1px solid var(--border-subtle);
    transition: var(--transition);
}
.slide-points li:hover {
    border-color: var(--border-accent);
    background: var(--bg-card);
}
.slide-points li::before {
    content: '';
    position: absolute; left: 15px; top: 50%;
    transform: translateY(-50%);
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent-glow);
}
.slide-points li strong {
    color: var(--gold); font-weight: 500;
}

/* 노트 블록 (aside) */
.slide-note {
    display: flex; gap: 14px; align-items: flex-start;
    background: var(--bg-elevated);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius);
    padding: 18px 20px; margin-top: 28px;
    position: relative; overflow: hidden;
}
.slide-note::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent));
    opacity: 0.5;
}
.note-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
.note-content {
    color: var(--text-secondary); font-size: 13px;
    line-height: 1.8; font-weight: 300;
}
.note-content strong { color: var(--text-primary); font-weight: 500; }

/* 이미지 */
.slide-image {
    margin-bottom: 20px; text-align: center;
}
.slide-image img {
    max-width: 100%; border-radius: var(--radius);
    border: 1px solid var(--border-dim);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

/* ========== 정의 카드 (> **제목** 본문 패턴) ========== */
.slide-def-card {
    background: var(--bg-card);
    border-left: 2px solid var(--accent);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 18px 22px;
    margin-bottom: 12px;
    transition: var(--transition);
}
.slide-def-card:hover {
    border-left-color: var(--gold);
    background: rgba(24,28,42,0.9);
}
.def-title {
    color: var(--gold); font-size: 14.5px; font-weight: 700;
    margin-bottom: 8px; letter-spacing: 0.2px;
}
.def-desc {
    color: var(--text-secondary); font-size: 13.5px;
    line-height: 1.8; font-weight: 300;
}
.def-desc strong { color: var(--text-primary); font-weight: 500; }

/* ========== 섹션 카드 (**볼드 헤더** + 본문) ========== */
.slide-card {
    background: var(--bg-elevated);
    border-radius: var(--radius-sm);
    padding: 16px 20px;
    margin-bottom: 10px;
    border: 1px solid var(--border-subtle);
    transition: var(--transition);
}
.slide-card:hover {
    border-color: var(--border-accent);
    transform: translateX(3px);
}
.card-heading {
    color: var(--gold); font-size: 14px; font-weight: 700;
    margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
}
.card-heading::before {
    content: ''; display: inline-block;
    width: 3px; height: 14px;
    background: var(--accent); border-radius: 2px;
    flex-shrink: 0;
}
.card-desc {
    color: var(--text-secondary); font-size: 13px;
    line-height: 1.8; font-weight: 300;
    padding-left: 11px;
}
.card-desc strong { color: var(--text-primary); font-weight: 500; }
.card-desc em { color: var(--accent-bright); font-style: normal; }

/* ========== 오디오 구간 맵 (재생바 아래 타임라인) ========== */
#audio-map {
    max-width: 860px; margin: 8px auto 0;
    height: 26px;
    display: flex;
    gap: 1px;
    border-radius: 4px;
    overflow: hidden;
    background: var(--bg-elevated);
}
.map-segment {
    height: 100%;
    min-width: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: filter 0.15s;
    overflow: hidden;
    white-space: nowrap;
    padding: 0 2px;
}
.map-segment:hover {
    filter: brightness(1.3);
    z-index: 1;
}
.map-segment.active {
    filter: brightness(1.4);
    color: #fff;
    font-weight: 700;
}
/* 구간별 색상 (순서대로 순환) — gap 요소 제외 */
.map-segment:nth-of-type(odd)  { background: rgba(129,140,248,0.35); }
.map-segment:nth-of-type(even) { background: rgba(240,192,64,0.25); }
.map-gap {
    height: 100%;
    background: var(--bg-elevated);
}

/* ========== 메인 레이아웃 (콘텐츠 + 인덱스) ========== */
#main-layout {
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
}
#slide-area {
    flex: 1;
    min-width: 0;
}
#slide-container {
    max-width: 800px; margin: 0 auto;
    padding: 40px 28px 80px;
}

/* ========== 인덱스 패널 (우측 사이드바) ========== */
#index-panel {
    width: 240px;
    flex-shrink: 0;
    border-left: 1px solid var(--border-subtle);
    background: var(--bg-surface);
    position: sticky;
    top: 80px;
    height: calc(100vh - 80px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-dim) transparent;
}
#index-panel::-webkit-scrollbar { width: 4px; }
#index-panel::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 2px; }

#index-header {
    padding: 16px 16px 10px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    border-bottom: 1px solid var(--border-subtle);
}

.index-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 8px 16px;
    cursor: pointer;
    transition: var(--transition);
    border-left: 2px solid transparent;
    font-size: 12px;
    line-height: 1.5;
}
.index-item:hover {
    background: var(--bg-elevated);
    border-left-color: var(--border-accent);
}
.index-item.active {
    background: var(--bg-card);
    border-left-color: var(--accent);
}
.index-item .idx-id {
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    flex-shrink: 0;
    min-width: 28px;
}
.index-item .idx-title {
    color: var(--text-secondary);
    font-weight: 300;
}
.index-item.active .idx-title {
    color: var(--text-primary);
    font-weight: 400;
}
.index-item.has-audio .idx-id::after {
    content: ' ♪';
    color: var(--green);
    font-size: 8px;
}

/* ========== 반응형 ========== */
@media (max-width: 900px) {
    #index-panel { display: none; }
    #main-layout { display: block; }
    #audio-map { margin-top: 12px; }
}
@media (max-width: 640px) {
    /* 오디오 바 */
    #audio-bar { padding: 10px 12px; }
    #audio-map { margin-top: 16px; }
    #audio-controls { gap: 6px; }
    #play-btn { width: 36px; height: 36px; font-size: 14px; }
    .skip-btn { width: 30px; height: 30px; font-size: 11px; }
    #time-display { min-width: 70px; font-size: 10px; }
    #speed-select { padding: 4px 6px; font-size: 10px; }

    /* 네비게이션 도트: 가로 스크롤 */
    #slide-nav {
        flex-wrap: nowrap;
        justify-content: flex-start;
        padding: 8px 12px;
        gap: 2px;
    }
    .nav-dot { width: 28px; height: 26px; font-size: 9px; flex-shrink: 0; }

    /* 슬라이드 영역 */
    #slide-container { padding: 20px 14px 80px; }
    #slide-title { font-size: 20px; margin-bottom: 20px; padding-bottom: 14px; }
    #slide-header { gap: 8px; margin-bottom: 8px; }
    #slide-id { font-size: 10px; }
    #slide-badge { font-size: 9px; padding: 2px 8px; }

    /* 콘텐츠 블록 */
    .slide-text { font-size: 13.5px; line-height: 1.9; }
    .slide-card { padding: 16px; }
    .slide-def-card { padding: 14px; }
    .slide-note { padding: 14px 16px; font-size: 12.5px; }
    .slide-points li { font-size: 13.5px; }
    .slide-image img { max-height: 50vh; }

    /* 자막 바 */
    #subtitle-bar { padding: 10px 14px; }
    #subtitle-text { font-size: 0.9rem; }
}

/* 자막 바 */
#subtitle-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    text-align: center;
    padding: 14px 24px;
    background: rgba(0, 0, 0, 0.82);
    z-index: 1000;
    pointer-events: none;
    min-height: 24px;
}

#subtitle-text {
    color: #f0f0f0;
    font-size: 1.05rem;
    line-height: 1.5;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.7);
    transition: opacity 0.15s ease;
}

#subtitle-bar:empty,
#subtitle-bar:has(#subtitle-text:empty) {
    opacity: 0;
}
/* ========== 모바일 목차 FAB + 오버레이 ========== */
#index-fab {
    display: none;
    position: fixed;
    bottom: 76px; right: 20px;
    z-index: 1100;
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 1px solid var(--border-dim);
    background: var(--bg-elevated);
    color: var(--text-secondary);
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    transition: var(--transition);
    align-items: center; justify-content: center;
}
#index-fab:hover {
    background: var(--accent);
    color: #fff;
    border-color: transparent;
}
@media (max-width: 900px) {
    #index-fab { display: flex; }
}

#index-overlay {
    display: none;
    position: fixed; inset: 0;
    z-index: 1200;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
}
#index-overlay.open { display: flex; justify-content: flex-end; }

#index-overlay-panel {
    width: min(320px, 85vw);
    height: 100%;
    background: var(--bg-surface);
    border-left: 1px solid var(--border-subtle);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-dim) transparent;
    animation: slideInRight 0.25s ease-out;
}
@keyframes slideInRight {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
}
#index-overlay-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px;
    border-bottom: 1px solid var(--border-subtle);
}
#index-overlay-header span {
    font-size: 11px; font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
}
#index-overlay-close {
    background: transparent; border: none;
    color: var(--text-muted); font-size: 22px;
    cursor: pointer; padding: 4px 8px;
    border-radius: 6px;
    transition: var(--transition);
}
#index-overlay-close:hover {
    background: var(--bg-elevated); color: var(--text-primary);
}
#index-overlay-list .index-item {
    padding: 12px 16px;
}

</style>
</head>
<body>
<div id="app">
  <div id="audio-bar">
    <audio id="audio" src="유저의_뇌를_쥐고_흔드는_게임_기획의_뼈대.m4a" preload="auto"></audio>
    <div id="audio-controls">
      <button class="skip-btn" onclick="skipTime(-10)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="2.5" height="12" rx="1" fill="currentColor"/><path d="M13 1.5L5 7L13 12.5V1.5Z" fill="currentColor"/></svg></button>
      <button id="play-btn" onclick="togglePlay()"><svg width="12" height="14" viewBox="0 0 12 14" fill="none"><path d="M1 1.5L11 7L1 12.5V1.5Z" fill="currentColor"/></svg></button>
      <button class="skip-btn" onclick="skipTime(10)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1.5L9 7L1 12.5V1.5Z" fill="currentColor"/><rect x="10.5" y="1" width="2.5" height="12" rx="1" fill="currentColor"/></svg></button>
      <span id="time-display">0:00 / 0:00</span>
      <input type="range" id="seek-bar" min="0" max="86400" value="0" step="0.1">
      <select id="speed-select" onchange="changeSpeed(this.value)">
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>

  {

    "title": "중심 테마",

    "content": "<div class=\"slide-text\">컨셉이 같더라도 중심 테마가 다르면 완전히 다른 게임이 된다.</div>\n<div class=\"slide-def-card\"><div class=\"def-title\">공통 컨셉</div><div class=\"def-desc\">좀비가 가득한 도시에서 살아남는 생존 액션 게임</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">중심 테마 A : 처절한 이기심</div><div class=\"card-desc\">생존을 위한 처절한 이기심을 강조</div></div>\n<ul class=\"slide-points\"><li>자원이 극도로 부족</li><li>동료를 배신해야 내가 살 수 있는 선택지 부여</li><li>생존자 간의 긴장과 불신</li></ul>\n<div class=\"slide-card\"><div class=\"card-heading\">중심 테마 B : 절망 속의 인간애</div><div class=\"card-desc\">절망 속에서도 피어나는 인간애</div></div>\n<ul class=\"slide-points\"><li>혼자서는 절대 깰 수 없는 구조</li><li>서로 도와야만 보상을 얻는 협력 시스템</li><li>생존자 간의 유대와 신뢰</li></ul>\n<div class=\"slide-card\"><div class=\"card-heading\">컨셉</div><div class=\"card-desc\">은 게임의 장르와 특징을 말하고, <strong>중심 테마</strong>는 그 게임이 유저에게 어떤 의미를 줄 지 결정한다.</div></div>",

    "id": "P14",
    "title": "중심 테마의 예시",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">모던 워페어</div></div>\n<div class=\"slide-quote\">실제 전장의 긴장감과 고통까지 전달</div>\n<div class=\"slide-text\">단순한 슈팅 액션을 넘어 전쟁의 무게감과 도덕적 딜레마를 전달하는 게임입니다. 현실적인 전투 상황과 민간인 보호 같은 요소를 통해 전쟁의 복잡성을 경험하게 한다. → Ex) <strong>리멤버 노 러시안</strong></div>\n<div class=\"slide-card\"><div class=\"card-heading\">바이오 해저드</div></div>\n<div class=\"slide-quote\">이윤만을 추구하는 기업이 어디까지 갈 수 있는가?</div>\n<div class=\"slide-text\">단순한 좀비 호러를 넘어 기업의 탐욕이 초래한 재앙을 다룬다. 엄브렐라사의 비윤리적 실험과 그 결과로 벌어지는 참사를 통해 자본주의의 어두운 면을 조명한다.</div>\n<div class=\"slide-card\"><div class=\"card-heading\">문명 온라인</div></div>\n<div class=\"slide-quote\">유저 스스로 선택하고 만들어가는 세상</div>\n<div class=\"slide-text\">플레이어의 모든 선택이 세계의 역사를 만들어간다. 문명의 발전 방향, 외교 관계, 전쟁과 평화 등 모든 것이 플레이어의 손에 달려 있어 진정한 샌드박스 경험을 제공한다.</div>",
    "hasAudio": false,
    "start": null,
    "end": null
  },
  {
    "id": "P15",
    "title": "중심 테마의 중요성",
    "content": "<ul class=\"slide-points\"><li><strong>일관된 표현</strong> 테마는 게임 플레이의 전반에 걸쳐 표현되어야 한다. 테마와 실제 게임이 따로 놀면 안된다.</li></ul>\n<ul class=\"slide-points\"><li><strong>컨텐츠 파생</strong> 테마를 통해 게임의 스토리와 컨텐츠, 시스템이 파생된다.</li></ul>\n<div class=\"slide-card\"><div class=\"card-heading\">예시 1: 커피 가게 운영</div><div class=\"card-desc\">나만의 커피 가게를 운영하는 게임이니까… → 단골 손님을 만들어 가는 시스템은 어떨까?</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">예시 2: 전장의 긴장감</div><div class=\"card-desc\">실제 전장의 긴장감을 표현하는 게임이니까… → 부상을 당하면 땀과 피로 화면을 뿌옇게 만들자!</div></div>",
    "hasAudio": false,
    "start": null,
    "end": null
  },
  {
    "id": "P16",
    "title": "이 컨셉의 핵심이 뭐야?",
    "content": "<div class=\"slide-text\">모든 게임에는 플레이어를 사로잡는 <strong>핵심 요소</strong>가 있다.</div>",
    "hasAudio": false,
    "start": null,
    "end": null
  },
  {
    "id": "P17",
    "title": "핵심 컨텐츠?",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">정의</div><div class=\"card-desc\">중심 테마를 가장 잘 느낄 수 있는 게임 컨텐츠. 유저가 해당 게임을 선택하고 즐기게 되는 가장 핵심적이고 차별적인 컨텐츠이다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">관점의 차이</div><div class=\"card-desc\">컨셉 단계에서의 핵심 컨텐츠는 게임 디자인 관점이 아니라 유저 관점에서의 컨텐츠이다. 컨텐츠, 시스템, 레벨 디자인, 밸런싱 등이 모두 합쳐진 게임의 즐길거리를 의미한다.</div></div>\n<div class=\"slide-text\">대부분의 게임에서 모든 컨텐츠는 핵심 컨텐츠를 중심으로 배치된다.</div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\"><strong>핵심 컨텐츠의 성공 = 해당 게임의 성공</strong><br>(예외도 있긴 하다.)</div></div>",
    "hasAudio": true,
    "start": 328.7,
    "end": 355.1
  },
  {
    "id": "P18",
    "title": "핵심 컨텐츠는 게임의 정체성을 결정한다.",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">Ex : 리니지의 공성전</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">혈맹 결속력</div><div class=\"card-desc\">혈맹이라는 유저 모임의 결속력 강화</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">혈맹 간 경쟁</div><div class=\"card-desc\">혈맹 간의 경쟁 심화로 장기 플레이 유도</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">하드코어 유저</div><div class=\"card-desc\">게임 이해도가 높고 접속 시간이 긴 유저가 게임을 주도</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">거래 활성화</div><div class=\"card-desc\">캐릭터, 아이템 거래 급증</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">부작용 :</div><div class=\"card-desc\">작업장, 봇, 오토 프로그램의 난입</div></div>",
    "hasAudio": true,
    "start": 355.1,
    "end": 398.5
  },
  {
    "id": "P19",
    "title": "핵심 컨텐츠와 주변 컨텐츠",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">확장성</div><div class=\"card-desc\">핵심 컨텐츠를 중심으로 많은 주변 컨텐츠들이 파생된다. 좋은 핵심 컨텐츠는 강력한 확정성을 가진다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">Ex : 던전앤파이터</div><div class=\"card-desc\">: ‘재미있는 온라인 벨트스크롤 액션’이라는 좋은 핵심 컨텐츠가 있어 10년 이상 주변 컨텐츠를 보강하며 수명을 이어갔습니다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">Ex : 게임빌 프로야구</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">핵심</div><div class=\"card-desc\">: 나만의 선수 육성(컨텐츠 x) → 선수 고유 스킬 장착 및 레벨 업그레이드</div></div>\n<ul class=\"slide-points\"><li>훈련, 경기 참가 스케줄 진행</li><li>주변 인물들과의 에피소드 및 연애</li></ul>\n<div class=\"slide-text\"># <strong>P20) 초보 기획자의 흔한 함정: 잘못된 개선 방향</strong></div>\n<div class=\"slide-text\">게임을 더욱 재밌게 만들고자 할 때, 신입 기획자들이 흔히 저지르는 실수는 핵심적인 재미 요소를 깊게 고민하기보다 단순히 새로운 요소를 덧붙이는 작업에 집중한다는 점이다. 이들은 다음과 같은 접근 방식으로 게임을 ‘개선’하려고 한다.</div>\n<div class=\"slide-text\">**🗡️<br>더 많은 적**</div>\n<div class=\"slide-text\">**🗺️<br>더 많은 지역과 던전**</div>\n<div class=\"slide-text\">**🧃<br>더 좋은 아이템**</div>\n<div class=\"slide-text\">**⚙️<br>다양한 모드 추가**</div>\n<div class=\"slide-text\">**📖<br>더 풍성한 스토리**</div>\n<div class=\"slide-quote\">이러한 접근은 게임의 본질적인 재미, 즉 ‘핵심 컨텐츠’를 강화하는 고민 없이, 주변 컨텐츠만을 무작정 덧붙여 게임을 복잡하게 만들 뿐이다. 진정한 개선은 핵심에서 시작된다.</div>",
    "hasAudio": false,
    "start": null,
    "end": null
  },
  {

    "title": "기획 의도를 살려볼까?",
    "content": "<div class=\"slide-text\">왜 이 시스템을 만드는지, 그 목적이 명확해야 한다.</div>",

  {
    "id": "P22",
    "title": "기획 의도",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">시스템 디자인</div><div class=\"card-desc\">게임의 구조를 설계하는 일이다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">기획 의도의 명확화</div><div class=\"card-desc\">시스템 기획의 목표이자 검증 항목이다.</div></div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\">기획 의도를 파악하는 훈련은 초보 게임 기획자에게 매우 중요하다. 왜 이 시스템이 필요한지, 무엇을 달성하려는지 명확히 알아야 좋은 기획이 나온다.</div></div>",
    "hasAudio": false,
    "start": null,
    "end": null
  },
  {
    "id": "P23",
    "title": "기획 의도가 불명확한 시스템 기획은",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">시간 낭비</div><div class=\"card-desc\">방향을 잃으면서 개발 시간과 리소스를 낭비한다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">의사결정 지연</div><div class=\"card-desc\">명확한 기준이 없어 중요한 의사 결정을 내리지 못하게 한다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">기술 부채 발생</div><div class=\"card-desc\">지저분한 구조, 하드 코딩, 수많은 주석 처리된 소스 코드 양산</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">리소스 낭비</div><div class=\"card-desc\">만들어 놓고 쓰이지 않는 그래픽 리소스와 폐기되는 기획서들이 쌓인다.</div></div>",
    "hasAudio": false,
    "start": null,
    "end": null
  },
  {
    "id": "P24",
    "title": "기획 의도의 설정",
    "content": "<div class=\"slide-text\">게임 내 주요 핵심 컨텐츠와 파생 컨텐츠의 기획 의도 설정을 통해 각 컨텐츠의 리소스 양을 배분한다.</div>\n<div class=\"slide-card\"><div class=\"card-heading\">작업기간</div><div class=\"card-desc\">: 각 컨텐츠에 필요한 개발시간</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">작업 인력</div><div class=\"card-desc\">: 투입될 팀원의 수와 역할</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">데이터량</div><div class=\"card-desc\">: 필요한 데이터의 규모</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">그래픽 리소스</div><div class=\"card-desc\">: 아트 작업의 양과 퀄리티</div></div>",
    "hasAudio": false,
    "start": null,
    "end": null
  },
  {
    "id": "P25",
    "title": "기획 의도의 정리",
    "content": "<div class=\"slide-text\">핵심 컨텐츠와 파생 컨텐츠, 기획 의도 정리를 통해 다음 요소들이 정리된다.</div>\n<div class=\"slide-card\"><div class=\"card-heading\">재미 포인트</div><div class=\"card-desc\">유저 흡인 구조</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">잔류 요소</div><div class=\"card-desc\">컨텐츠 소모 관리</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">결제 유도</div><div class=\"card-desc\">유료화 구조</div></div>\n<div class=\"slide-text\">하지만 방향성을 명확히 하기 위해 해당 요소들은 따로 떼어 정리하는 것이 좋다.</div>",

    "id": "P28",
    "title": "핵심 사이클의 중요성",
    "content": "<div class=\"slide-def-card\"><div class=\"def-title\">유저가 가장 자주, 빈번하게, 게임의 극초반부터 하게 되는 반복적인 플레이</div><div class=\"def-desc\"></div></div>\n<div class=\"slide-text\">핵심 사이클은 게임의 핵심적인 재미와 몰입감에 결정적 영향을 미칩니다. 아무리 훌륭한 그래픽과 스토리가 있어도 핵심 사이클이 재미없다면 플레이어는 게임을 떠나게 된다.</div>\n<div class=\"slide-text\">처음부터 모든 컨텐츠를 제공하지 않고 서서히 제공하면, 적절한 학습과 핵심 사이클의 지루함을 막아준다!<br>= 컨텐츠 배치<br>*전략 게임의 경우 처음부터 과도한 학습이 이루어져 유저가 지칠 수 있다!</div>",

const TRANSCRIPT = [{"start": 0.0, "end": 6.640000000000001, "text": "수백억 원의 천문학적인 개발비에 업계의 최고라 불리는 수백냉의 그래픽 아티스트들"}, {"start": 6.640000000000001, "end": 10.9, "text": "거기에 막 헐리우드 유명 배우를 모델로 쓴 화려한 마케팅까지"}, {"start": 10.9, "end": 12.94, "text": "네 정말 엄청난 스케일이죠"}, {"start": 12.94, "end": 13.86, "text": "맞아요"}, {"start": 13.86, "end": 18.26, "text": "겉보기엔 절대 실패할 수 없을 것 같은 이 거대한 프로젝트가"}, {"start": 18.26, "end": 25.400000000000002, "text": "막상 출시일이 되면 유저들 컴퓨터에서 단 5분만에 삭제되어버리는 참사가 심심치 않게 일어나잖아요"}, {"start": 25.400000000000002, "end": 27.7, "text": "사실 업계에선 꽤 흔한 일입니다"}, {"start": 27.7, "end": 31.58, "text": "그니까요 반면에 출시된 지 10년이 넘었는데도"}, {"start": 31.58, "end": 37.06, "text": "픽셀 그래픽 하나로 수백만 명이 밤을 세우며 열광하는 인디 게임도 있고요"}, {"start": 37.06, "end": 38.64, "text": "네 극단적인 차이죠"}, {"start": 38.64, "end": 43.78, "text": "도대체 그 재미라는 녀석의 실체가 뭐길래 이런 차이를 만드는 걸까요?"}, {"start": 43.78, "end": 47.34, "text": "그래서 오늘 우리는 단지 표면적인 기술이 아니라"}, {"start": 47.34, "end": 52.06, "text": "유저의 뇌와 심장을 쥐고 흔드는 게임 기획에 숨겨진 DNA"}, {"start": 52.06, "end": 55.94, "text": "그 창조의 뼈대를 밑바닥부터 완전히 해부해보겠습니다"}, {"start": 55.98, "end": 60.66, "text": "아 현업에서 기획자로 10년 넘게 일하면서 진짜 뼈저리게 느끼는 부분이에요"}, {"start": 60.66, "end": 63.66, "text": "유저들을 수백 시간 동안 그 세계에 머물게 만드는 힘은"}, {"start": 63.66, "end": 67.3, "text": "결국 눈에 보이지 않는 기획의 치밀한 설계에서 나오거든요"}, {"start": 67.3, "end": 71.53999999999999, "text": "아 겉모습이 근육질이라도 뼈대가 뒤틀려 있으면 무너지는 거군요"}, {"start": 71.53999999999999, "end": 74.97999999999999, "text": "맞습니다 오늘 우리가 파헤칠 이 자료의 내용들은"}, {"start": 74.97999999999999, "end": 77.53999999999999, "text": "단순히 게임 재미있게 만드는 법을 넘어서"}, {"start": 77.53999999999999, "end": 81.3, "text": "인간의 욕망과 행동을 어떻게 설계하고 유도할 것인가에 대한"}, {"start": 81.3, "end": 83.42, "text": "깊은 심리학작 통찰이 될 겁니다"}, {"start": 83.42, "end": 85.18, "text": "와 너무 기대되네요"}, {"start": 85.18, "end": 87.74000000000001, "text": "저도 게임이라면 밤새 호감에 해봤지만"}, {"start": 87.74000000000001, "end": 91.98, "text": "정작 이 세계가 어떤 설계도로 지어졌는지는 전혀 몰랐거든요"}, {"start": 91.98, "end": 95.98, "text": "뭐 모든 창조의 시작은 대체 뭘 만들 것인가에서 출발할 텐데"}, {"start": 95.98, "end": 98.7, "text": "가장 첫 단추인 컨셉부터 짚어보죠"}, {"start": 98.7, "end": 103.22, "text": "그 살아있는 컨셉이란 개발 과정에서 끊임없이 쏟아지는 수많은 아이디어의 유혹과"}, {"start": 103.22, "end": 107.26, "text": "잡음을 단호하게 차단해주는 강력한 필터, 이제 문직이입니다"}, {"start": 107.26, "end": 110.54, "text": "문직이요? 그게 정확히 무슨 말이에요?"}, {"start": 110.54, "end": 114.58000000000001, "text": "보통 컨셉이라고 하면 막 세상을 구할 단 하나의 영웅"}, {"start": 114.58, "end": 118.5, "text": "뭐 이런 멋진 마케팅 슬로건이나 포장지 같은 거 아닌가요?"}, {"start": 118.5, "end": 121.86, "text": "초보 기획자들이 가장 많이 하는 오해가 딱 그거예요"}, {"start": 121.86, "end": 125.78, "text": "최첨단, 혁신적인 이런 추상적인 단호의 나열은"}, {"start": 125.78, "end": 129.3, "text": "아무것도 걸러내지 못하는 죽은 컨셉입니다"}, {"start": 129.3, "end": 131.38, "text": "일본의 수루가 은행 사례를 한번 보시죠"}, {"start": 131.38, "end": 132.5, "text": "네, 은행이요?"}, {"start": 132.5, "end": 137.26, "text": "네 이들은 대형 은행과 경쟁하려고 개인금융 업무 특화"}, {"start": 137.26, "end": 141.38, "text": "오프라인 디점 없는 온라인 전용, 정맥인식 시스템이라는"}, {"start": 141.38, "end": 144.26, "text": "아주 구체적이고 살아있는 컨셉을 내세웠습니다"}, {"start": 144.26, "end": 146.06, "text": "아 엄청 구체적이네요"}, {"start": 146.06, "end": 147.1, "text": "그렇죠"}, {"start": 147.1, "end": 150.94, "text": "누군가 막 강남역에 번듯한 오프라인 지점을 하나 낼까요?"}, {"start": 150.94, "end": 152.42, "text": "하고 제안했을 때"}, {"start": 152.42, "end": 154.42, "text": "이 컨셉이라는 문직이가"}, {"start": 154.42, "end": 158.94, "text": "우리는 온라인 전용이다 돌아가라 하면서 유혹을 단호하게 쳐낸 겁니다"}, {"start": 158.94, "end": 162.82, "text": "오, 무언가를 덧붙이기 위한 포장지가 아니라"}, {"start": 162.82, "end": 166.89999999999998, "text": "오히려 무엇을 안 할지 단호하게 결정해주는 기준점이군요"}, {"start": 166.89999999999998, "end": 168.73999999999998, "text": "네, 맞습니다"}, {"start": 168.73999999999998, "end": 173.5, "text": "공포게임에서 웃긴 댄스 감정 표현을 쳐내는 것도 이 문직이의 역할이죠"}, {"start": 173.5, "end": 177.46, "text": "그럼 이도록 중요한 문직이 역할을 할 명확한 컨셉은"}, {"start": 177.46, "end": 180.74, "text": "대체 어떤 요소들이 결합되어야 세상에 나올 수 있는 건가요?"}, {"start": 180.74, "end": 186.02, "text": "완벽한 컨셉은 게임의 배경에 대는 테마, 유저가 직접 겪게 될 경험"}, {"start": 186.02, "end": 189.94, "text": "그리고 그 경험을 구현할 메커니즘이라는 세 가지 요소가"}, {"start": 189.94, "end": 193.54, "text": "정확히 결합되어 하나의 장르를 완성하는 공식입니다"}, {"start": 193.54, "end": 194.74, "text": "공식이요?"}, {"start": 194.74, "end": 198.3, "text": "창조적이고 자유로워야 할 기획의 영역에"}, {"start": 198.3, "end": 201.9, "text": "그런 수학공식 같은 딱 떨어지는 법칙이 존재한다는 게"}, {"start": 201.94, "end": 204.18, "text": "정확히 무슨 말인지 감이 잘 안 옵니다"}, {"start": 204.18, "end": 208.46, "text": "흔히 아시는 생존게임을 예로 들어서 공식을 대입해 볼게요"}, {"start": 208.46, "end": 213.3, "text": "좀비바이러스가 찬 골에 인류가 멸망했다는 배경스토리가 바로 테마입니다"}, {"start": 213.3, "end": 215.06, "text": "아, 그 암울한 분위기요?"}, {"start": 215.06, "end": 218.38, "text": "네, 근데 테마만으로는 게임이 안 되니까"}, {"start": 218.38, "end": 221.5, "text": "유저는 버려진 도시를 뒤져 식량을 찾고"}, {"start": 221.5, "end": 225.06, "text": "은신처를 짓는다는 육체적 심리적 경험을 하게 됩니다"}, {"start": 225.06, "end": 227.02, "text": "네, 직접 겪는 거니까요"}, {"start": 227.02, "end": 231.18, "text": "그리고 이 경험을 유저가 조작할 수 있게 총기 조준 시스템이나"}, {"start": 231.18, "end": 233.98000000000002, "text": "허기게이지 같은 메커니즘으로 구현하는 거죠"}, {"start": 233.98000000000002, "end": 236.26000000000002, "text": "이 세 가지가 완벽하게 결합될 때"}, {"start": 236.26000000000002, "end": 240.14000000000001, "text": "3인칭 좀비 생존 액션이라는 명확한 장르가 나오는 겁니다"}, {"start": 240.14000000000001, "end": 243.98000000000002, "text": "아, 세 가지가 모여서 설계도인 장르가 딱 완성되는 거군요"}, {"start": 243.98000000000002, "end": 246.62, "text": "근데 여기서 좀 엄청난 의문이 생깁니다"}, {"start": 246.62, "end": 252.5, "text": "만약 두 회사가 좀비 생존 액션이라는 똑같은 장르를 가지고 기획을 시작하면"}, {"start": 252.5, "end": 256.1, "text": "결국 세상에 나오는 결과물들은 다 비슷한 무기 들고"}, {"start": 256.1, "end": 258.42, "text": "좀비 쏘는 복제품이 되는 거 아닌가요?"}, {"start": 258.46000000000004, "end": 261.46000000000004, "text": "컨셉이 유저의 손과 눈이 하는 일이라면"}, {"start": 261.46000000000004, "end": 264.74, "text": "중심 테마는 유저의 플레이가 모두 끝난 후"}, {"start": 264.74, "end": 269.06, "text": "마음속 깊은 곳에 남게 되는 단 하나의 본질적인 감정입니다"}, {"start": 269.06, "end": 270.46000000000004, "text": "감정이요?"}, {"start": 270.46000000000004, "end": 273.3, "text": "아니, 똑같은 페어에서 똑같이 샷건 들고"}, {"start": 273.3, "end": 275.94, "text": "좀비 머리 날려버리는 조작을 하고 있는데"}, {"start": 275.94, "end": 279.86, "text": "어떻게 유저가 느끼는 감정에 완전히 달라질 수 있다는 건가요?"}, {"start": 279.86, "end": 282.90000000000003, "text": "그게 바로 기획의 마법이 일어나는 지정입니다"}, {"start": 282.90000000000003, "end": 285.46000000000004, "text": "같은 좀비 게임이라도 중심 테마를"}, {"start": 285.46, "end": 288.62, "text": "처절한 이기심과 불신으로 잡았다고 가정해보죠"}, {"start": 288.62, "end": 290.21999999999997, "text": "어, 듣기만 해도 상막하네요?"}, {"start": 290.21999999999997, "end": 295.78, "text": "네, 기획자는 이 테마를 전달하려고 식량을 극도로 제한하고"}, {"start": 295.78, "end": 300.34, "text": "내가 살기 위해 어제의 동료를 뒤에서 찔러야만 하는 시스템을 넣습니다"}, {"start": 300.34, "end": 305.14, "text": "유저들은 플레이 내내 막다른 유저를 의심하며 편집증적인 감정을 느끼죠"}, {"start": 305.14, "end": 307.5, "text": "와, 화면 밖에서도 긴장하겠어요"}, {"start": 307.5, "end": 312.65999999999997, "text": "반면에 똑같은 좀비물인데 테마가 절망 속에 인간해라면"}, {"start": 312.66, "end": 315.82000000000005, "text": "혼자서는 절대 열 수 없는 무거운 철문이나"}, {"start": 315.82000000000005, "end": 319.90000000000003, "text": "두 명이 등을 맞대야만 살아남는 협동방어 메코네즘을 넣게 됩니다"}, {"start": 319.90000000000003, "end": 323.82000000000005, "text": "아, 겉보기엔 똑같이 좀비를 쏘는 건데"}, {"start": 323.82000000000005, "end": 328.70000000000005, "text": "중심 테마에 따라 완전히 다른 철학을 가진 생명체가 되는 거군요"}, {"start": 328.70000000000005, "end": 331.3, "text": "그럼 이 중심 테마라는 영혼을"}, {"start": 331.3, "end": 335.14000000000004, "text": "유저들이 실제로 수백 시간 동안 경험하게 만들려면"}, {"start": 335.14000000000004, "end": 340.14000000000004, "text": "그 거대한 그릇, 즉 게임의 뼈대는 어떻게 만들어야 하는 건가요?"}, {"start": 340.14, "end": 345.94, "text": "그 중심 테마를 담아내는 단 하나의 압도적인 본질이 바로 핵심 컨텐츠이며"}, {"start": 345.94, "end": 349.53999999999996, "text": "많은 기획자들이 이 본질을 갈고 닦는 대신"}, {"start": 349.53999999999996, "end": 353.62, "text": "거칠에만 무작정 추가하려는 더 많은 것의 함정에 빠져서"}, {"start": 353.62, "end": 355.14, "text": "프로젝트를 망치곤 합니다"}, {"start": 355.14, "end": 356.41999999999996, "text": "함정이요?"}, {"start": 356.41999999999996, "end": 360.34, "text": "잠깐만요, 7만원씩 내고 게임 사는 유저 입장에서는"}, {"start": 360.34, "end": 362.5, "text": "타머멀 던전도 더 넓어지고"}, {"start": 362.5, "end": 364.82, "text": "영화 같은 컷신도 잔뜩 들어가는"}, {"start": 364.82, "end": 368.97999999999996, "text": "이른바 더 많은 것을 오히려 혜자스럽다고 열광하지 않나요?"}, {"start": 369.02000000000004, "end": 370.06, "text": "이게 왜 함정이죠?"}, {"start": 370.06, "end": 373.62, "text": "유저가 진짜 원하는 건 막 다양한 쓰레기가 아니라"}, {"start": 373.62, "end": 376.42, "text": "압도적으로 맛있는 하나의 코어거든요"}, {"start": 376.42, "end": 380.14000000000004, "text": "한국 게임 역사에 한 획을 그은 리니지 사례를 보시죠"}, {"start": 380.14000000000004, "end": 384.34000000000003, "text": "핵심 컨텐츠는 단연코 성을 뺏고 빼앗기는 공성전입니다"}, {"start": 384.34000000000003, "end": 386.94, "text": "네, 수백 명이 피 튀기게 싸우는 거요"}, {"start": 386.94, "end": 390.14000000000004, "text": "맞아요, 이 승리라는 단 하나의 목표를 위해"}, {"start": 390.14000000000004, "end": 394.42, "text": "유저들은 혈명으로 결속하고 밤나주로 몬스터를 잡습니다"}, {"start": 394.42, "end": 398.42, "text": "사냥, 아이템 거래가 다 공성전을 빛내기 위해 복무하는 거죠"}, {"start": 398.46000000000004, "end": 400.90000000000003, "text": "아, 하나의 목표를 향해서요?"}, {"start": 400.90000000000003, "end": 404.90000000000003, "text": "그런데 초보 기획자들은 재미없다는 피드백을 받으면"}, {"start": 404.90000000000003, "end": 407.90000000000003, "text": "자신이 만든 공성전을 고칠 생각은 안 하고"}, {"start": 407.90000000000003, "end": 410.54, "text": "갑자기 낚시 미니게임을 추가하거나"}, {"start": 410.54, "end": 412.82, "text": "의미 없는 레이싱 모델을 덧붙이려 듭니다"}, {"start": 412.82, "end": 417.54, "text": "아, 그러니까 스펀지 케이크 빵 반죽 자체가 퍽퍽하고 맛이 없는데"}, {"start": 417.54, "end": 420.98, "text": "그걸 고치지는 않고 그 위에 막 화려한 생크림이나"}, {"start": 420.98, "end": 424.42, "text": "비싼 금가루나 잔뜩 얹어서 수습하려는 꼴이네요"}, {"start": 424.42, "end": 426.02000000000004, "text": "완벽한 비유입니다"}, {"start": 426.02, "end": 429.21999999999997, "text": "그렇게 핵심과 무관한 시스템만 덕지덕지 붙이면"}, {"start": 429.21999999999997, "end": 433.02, "text": "결국 코드가 충돌해서 기술 부채가 산도미처럼 쌓이고"}, {"start": 433.02, "end": 434.14, "text": "집이 무너지는 겁니다"}, {"start": 434.14, "end": 437.09999999999997, "text": "본질을 바꾸는 게 진짜 개선이군요"}, {"start": 437.09999999999997, "end": 440.06, "text": "그럼 일주일에 한 번 열리는 거대한 공성전이"}, {"start": 440.06, "end": 441.78, "text": "그 케이크의 핵심이라면"}, {"start": 441.78, "end": 445.41999999999996, "text": "유저가 공성전이 없는 평범한 화요일 오후 2시에는"}, {"start": 445.41999999999996, "end": 449.65999999999997, "text": "대체 뭘 하면서 지루함을 견디고 계속 남아있게 되는 건가요?"}, {"start": 449.65999999999997, "end": 452.41999999999996, "text": "거대한 핵심 콘텐츠를 향해 달려가는"}, {"start": 452.41999999999996, "end": 454.65999999999997, "text": "길고 지루한 과정 속에서"}, {"start": 454.66, "end": 459.54, "text": "유저가 매순간 반복하면서도 즉각적인 쾌감을 느끼게 만드는"}, {"start": 459.54, "end": 462.62, "text": "초단기 행동 루프가 바로 핵심 사이클입니다"}, {"start": 462.62, "end": 464.34000000000003, "text": "초단기 행동 루프요?"}, {"start": 464.34000000000003, "end": 467.3, "text": "그냥 마우스 딸깍거려서 길가에 있는 슬라임 때리는"}, {"start": 467.3, "end": 469.22, "text": "아주 단순한 행동일 텐데"}, {"start": 469.22, "end": 471.62, "text": "그게 어떻게 수천번을 반복해도"}, {"start": 471.62, "end": 473.46000000000004, "text": "안 지루하고 짜릿할 수가 있죠?"}, {"start": 473.46000000000004, "end": 475.02000000000004, "text": "정확히 무슨 원리인가요?"}, {"start": 475.02000000000004, "end": 477.22, "text": "전 세계에서 제일 많이 하는 게임"}, {"start": 477.22, "end": 479.42, "text": "리그 오브 레전드를 떠올려 보세요"}, {"start": 479.42, "end": 483.46000000000004, "text": "1분 1초마다 하는 행동은 아주 작고 반복적인 루프거든요"}, {"start": 483.46, "end": 485.14, "text": "근데 미니언 때려 잡는 거요?"}, {"start": 485.14, "end": 485.94, "text": "맞습니다"}, {"start": 485.94, "end": 489.65999999999997, "text": "미니언 잡고 골드 얻고 더 강한 아이템 사고"}, {"start": 489.65999999999997, "end": 491.14, "text": "다시 미니언 잡고"}, {"start": 491.14, "end": 493.34, "text": "이 단순한 사이클이 계속 돌아가는데"}, {"start": 493.34, "end": 495.74, "text": "여기서 기획의 디테일이 빛을 바랍니다"}, {"start": 495.74, "end": 497.14, "text": "어떤 디테일이요?"}, {"start": 497.14, "end": 500.46, "text": "몬스터 때릴 때 단순히 차력만 깎이는 게 아니라"}, {"start": 500.46, "end": 504.5, "text": "칼이 닿는 순간 화면이 0.1초 미세하게 멈추는"}, {"start": 504.5, "end": 506.41999999999996, "text": "역경직 효과를 주거나"}, {"start": 506.41999999999996, "end": 509.85999999999996, "text": "골드 떨어질 때 찰창 하는 경쾌한 소리를 내서"}, {"start": 509.85999999999996, "end": 511.74, "text": "유저 뇌에 도파민을 뿜어냅니다"}, {"start": 511.74, "end": 515.26, "text": "아, 보상 얻으려고 억지로 노동하는 게 아니라"}, {"start": 515.26, "end": 519.58, "text": "때리는 그 1초의 행동 자체가 찰진 쾌감을 주는 윤활류군요"}, {"start": 519.58, "end": 521.58, "text": "네, 그대 핵심 사이클의 비밀입니다"}, {"start": 521.58, "end": 526.02, "text": "1초마다 터지는 도파민이 유저를 화요일 오후에도 묶어두는 거네요?"}, {"start": 526.02, "end": 528.54, "text": "그럼 기획자가 이 사이클을 어설프게 짜서"}, {"start": 528.54, "end": 532.1800000000001, "text": "유저가 아무 노력 없이 무한히 골드를 얻는 빈틈을 발견하면"}, {"start": 532.1800000000001, "end": 534.54, "text": "횡재한 기분의 게임이 더 재밌어지는 거 아닌가요?"}, {"start": 534.54, "end": 537.5, "text": "사이클 오륜하는 게 정확히 어떻게 게임을 망치는 건가요?"}, {"start": 537.5, "end": 540.58, "text": "루프 설계가 어긋날 때 발생하는 오류슝"}, {"start": 540.58, "end": 543.38, "text": "자원이 무한 증식하는 것을 엔진"}, {"start": 543.38, "end": 547.74, "text": "반대로 진행이 영구적으로 막혀버리는 것을 데드락이라고 부르는데"}, {"start": 547.74, "end": 550.4200000000001, "text": "이건 생태계 자체를 완전히 붕괴시킵니다"}, {"start": 550.4200000000001, "end": 556.1800000000001, "text": "무한 증식하는 엔진은 초인플레이션 처럼 돈가치가 폭락하니까 이해가 가는데"}, {"start": 556.1800000000001, "end": 558.9000000000001, "text": "진행이 영구적으로 멈춘다는 데드락은"}, {"start": 558.9000000000001, "end": 561.82, "text": "도대체 어떤 황당한 상황이길래 그렇게 부르죠?"}, {"start": 561.82, "end": 563.7, "text": "그냥 보통 게임 오버 뜨지 않나요?"}, {"start": 563.7, "end": 567.5400000000001, "text": "데드락의 제일 큰 공포는 게임 오버 창조차 안 뜨고"}, {"start": 567.54, "end": 570.62, "text": "유저를 영원한 연옥에 가둬버린다는 겁니다"}, {"start": 570.62, "end": 575.3399999999999, "text": "과고 명작 워크래프트 3 언데드 종족 사례가 이걸 완덕히 설명해 주죠"}, {"start": 575.3399999999999, "end": 576.74, "text": "어? 어떤 상황이죠?"}, {"start": 576.74, "end": 581.74, "text": "언데드는 금을 캐려면 무조건 금광위의 특수 건물을 지어야 해요"}, {"start": 581.74, "end": 584.66, "text": "당연히 지으려면 초기자금으로 금이 필요하고요"}, {"start": 584.66, "end": 590.6999999999999, "text": "근데 초보유저가 실수로 기본 제공된 단 하나의 금광 건물을 팔아버리면 어떻게 될까요?"}, {"start": 590.6999999999999, "end": 592.86, "text": "어? 그럼 다시 지을 돈이 모자라잖아요?"}, {"start": 592.86, "end": 596.8199999999999, "text": "맞습니다 일꾼도 살아있고 본진도 멀쩡한데"}, {"start": 596.82, "end": 600.38, "text": "금 캘 수단이 없으니 아무것도 생산할 수 없죠"}, {"start": 600.38, "end": 605.34, "text": "패배한 것도 아닌데 화면 속 일꾼들이 멍 때리는 것만 영원히 지켜봐야 합니다"}, {"start": 605.34, "end": 611.1400000000001, "text": "와 기획자가 설마 유저가 자기 밥 줄인 유일한 금광을 팔겠어 하고"}, {"start": 611.1400000000001, "end": 614.74, "text": "아닐하게 생각했다가 순환고리가 끊어진 거군요"}, {"start": 614.74, "end": 618.1800000000001, "text": "정말 완벽하게 닫힌 루프 설계가 중요하네요"}, {"start": 618.1800000000001, "end": 621.82, "text": "그럼 이 정교한 규칙과 사이클이 에러 없이 돌아가려면"}, {"start": 621.82, "end": 627.0600000000001, "text": "이 모든 시스템이 뛰어놀 거대한 무대, 즉 세계관은 어떻게 세워야 하는 건가요?"}, {"start": 627.0600000000001, "end": 631.7800000000001, "text": "세계관 구축이란 홈페이지에 적어놓는 멋진 판타시 소설이 아니라"}, {"start": 631.7800000000001, "end": 637.9000000000001, "text": "그 세계 안에서만 절대적으로 통용되는 고유한 물리법식과 상식을 창조해서"}, {"start": 637.9000000000001, "end": 640.22, "text": "유저의 뇌를 납득시키는 과정입니다"}, {"start": 640.22, "end": 642.1400000000001, "text": "고유한 물리법식이요?"}, {"start": 642.1400000000001, "end": 644.58, "text": "어차피 현실도 아닌 가상인데 그냥 막"}, {"start": 644.58, "end": 648.9000000000001, "text": "이 세계엔 마법이 존재한다 끝! 이렇게 한 줄 적어놓으면 안 되나요?"}, {"start": 648.9, "end": 652.8199999999999, "text": "굳이 현실 상식까지 복잡하게 뒤집어 엎어야 하는 이유가 정확히 뭔가요?"}, {"start": 652.8199999999999, "end": 658.54, "text": "그렇게 얕은 설정만으로는 유저가 그 세계에 완전히 몰입할 수 없기 때문입니다"}, {"start": 658.54, "end": 662.26, "text": "동양 판타지의 정수인 무협 세계관을 생각해보시죠"}, {"start": 662.26, "end": 663.22, "text": "네, 무협이요?"}, {"start": 663.22, "end": 667.8199999999999, "text": "현실 세계 물리법칙으론 아무리 운동한 80대 노인이라도"}, {"start": 667.8199999999999, "end": 671.66, "text": "근육 빵빵한 20대 격투기 선수를 절대 못 이깁니다"}, {"start": 671.66, "end": 674.06, "text": "나이 들면 반사신경이 쇠태하니까요"}, {"start": 674.06, "end": 675.54, "text": "당연하죠, 힘이 빠지잖아요"}, {"start": 675.54, "end": 679.78, "text": "하지만 무협은 여기에 내공이라는 고유의 법칙을 부여합니다"}, {"start": 679.78, "end": 684.8199999999999, "text": "우주의 기운을 축적하는 내공은 나이가 많을수록 더 거대해지죠"}, {"start": 684.8199999999999, "end": 688.78, "text": "이 법칙 하나로 현실 물리법칙이 완벽하게 뒤집힙니다"}, {"start": 688.78, "end": 693.74, "text": "아, 80대 노인이 20대를 날려버리는 게 이 세계에선 지극히 과학적이고"}, {"start": 693.74, "end": 695.38, "text": "함대적인 상식이 되는 거군요?"}, {"start": 695.38, "end": 700.66, "text": "네, 내부 논리를 완벽하게 세웠기 때문에 유저가 전혀 위심하지 않게 되는 거죠"}, {"start": 700.6999999999999, "end": 705.78, "text": "현실의 뻔한 제약을 기발한 법칙 하나가 완전히 박살내버리네요"}, {"start": 705.78, "end": 710.74, "text": "그럼 이렇게 철저하게 만들어진 세계관 속의 법칙이나 커다란 사건들이"}, {"start": 710.74, "end": 714.26, "text": "제가 마우스로 조작하는 실제 게임플레이 환경에는"}, {"start": 714.26, "end": 716.66, "text": "구체적으로 어떤 영향을 미치게 됩니까?"}, {"start": 716.66, "end": 722.5, "text": "훌륭한 세계관은 모든 요소가 거대한 톱미 바퀴처럼 유기적으로 얽혀있어서"}, {"start": 722.5, "end": 727.14, "text": "단 하나의 서사적 사건이 발생하면 정치, 경제를 넘어"}, {"start": 727.14, "end": 731.06, "text": "유저의 실제 퀘스트 동선까지 도미노처럼 통째로 바꿔놓습니다"}, {"start": 731.06, "end": 732.74, "text": "도미노처럼이요?"}, {"start": 732.74, "end": 737.34, "text": "게임 인트로 스토리커신 하나가 어떻게 게임 속 아이템 물가를 흔들고"}, {"start": 737.34, "end": 740.54, "text": "제가 내릴 당장 싸울 적군의 얼굴을 바꾼다는 건지"}, {"start": 740.54, "end": 742.9, "text": "그 구체적인 인과관계가 너무 궁금한데요?"}, {"start": 742.9, "end": 749.66, "text": "가상의 대륙에서 제국 황제의 병세가 급격히 악화되어 쓰러졌다는 사건이 던져졌다고 가정해봅시다"}, {"start": 749.66, "end": 752.7, "text": "하수들은 이걸 그냥 한 줄 텍스트로 소비하죠"}, {"start": 752.7, "end": 754.14, "text": "보통은 스킵하잖아요"}, {"start": 754.14, "end": 757.9, "text": "하지만 고수 기획자는 이걸 생태계 전체로 연결합니다"}, {"start": 757.9, "end": 762.02, "text": "황제가 쓰러졌으니 내전이 발발할 조짐이 보이고"}, {"start": 762.02, "end": 768.3, "text": "전쟁 임박 소문이 돌자 상앤들과 유저들이 철광석을 미친 듯이 사제기하기 시작합니다"}, {"start": 768.3, "end": 771.66, "text": "오... 그럼 무기구격이 엄청 뛰겠네요?"}, {"start": 771.66, "end": 774.98, "text": "네, 경제적 초인플레이션이 온 거죠"}, {"start": 774.98, "end": 778.98, "text": "철광석이 귀해지니 평화롭게 늑대나 사냥하던 유저들이"}, {"start": 778.98, "end": 781.66, "text": "갑자기 광산거블린 잡으려고 몰려들고"}, {"start": 781.6999999999999, "end": 786.14, "text": "결국 진영을 선택해서 다른 유저들과 용병으로 칼을 맞대야 하는"}, {"start": 786.14, "end": 788.1, "text": "새로운 갈등 구조로 빨려들어갑니다"}, {"start": 788.1, "end": 792.1, "text": "와, 황제의 기침소리 하나가 철광석 가격 폭등시키고"}, {"start": 792.1, "end": 795.02, "text": "제가 클릭할 방향자지 싹 다 바꿔버리예요"}, {"start": 795.02, "end": 796.98, "text": "정말 이제 기획자라는 직업은"}, {"start": 796.98, "end": 799.1, "text": "컴퓨터 코드 짜는 기술자가 아니라"}, {"start": 799.1, "end": 803.06, "text": "하나의 우주를 설계하는 조물주에 가깝다는 생각이 듭니다"}, {"start": 803.06, "end": 805.78, "text": "세계관의 유기적 연결이 가진 무서운 힘이죠"}, {"start": 805.78, "end": 809.3399999999999, "text": "오늘 우리 정말 방대한 기획의 여정을 걸어왔잖아요"}, {"start": 809.38, "end": 813.62, "text": "막 쏟아지는 잡음을 차단하는 문지기인 컨셉부터 시작해서"}, {"start": 813.62, "end": 816.34, "text": "유저 심장에 낙인을 짓는 중심 테마"}, {"start": 816.34, "end": 818.5400000000001, "text": "그리고 거칠에 쳐내고 집중해야 할"}, {"start": 818.5400000000001, "end": 821.4200000000001, "text": "단 하나의 그릇인 핵심 컨텐츠를 다뤘죠"}, {"start": 821.4200000000001, "end": 823.98, "text": "네, 그리고 그 지루함을 잊게 해주는"}, {"start": 823.98, "end": 827.5400000000001, "text": "1분 1초의 찰진 도파민인 핵심 사이클까지 봤습니다"}, {"start": 827.5400000000001, "end": 830.46, "text": "맞아요, 마지막으로 인간용망을 감싸하나"}, {"start": 830.46, "end": 832.3000000000001, "text": "완벽한 상식으로 설득해내는"}, {"start": 832.3000000000001, "end": 835.74, "text": "압도적인 세계관 구축의 비밀까지 들여다봤고요"}, {"start": 835.74, "end": 837.74, "text": "오늘 정말 깊은 통찰 감사합니다"}, {"start": 837.78, "end": 839.74, "text": "어, 저 역시 즐거웠습니다"}, {"start": 839.74, "end": 842.1, "text": "오늘 해보한 뼈대들을 이해하셨다면"}, {"start": 842.1, "end": 844.54, "text": "오늘 밤 여러분 즐기시는 게임 켰을 때"}, {"start": 844.54, "end": 846.82, "text": "화면이 완전히 다르게 보이실 겁니다"}, {"start": 846.82, "end": 849.98, "text": "화려한 이펙트 뒤편에 있는 치밀한 의도랑"}, {"start": 849.98, "end": 852.3, "text": "여러분 등더미는 그 핵심 사이클을"}, {"start": 852.3, "end": 854.7, "text": "직접 찾아보는 재미를 꼭 느껴보세요"}, {"start": 854.7, "end": 858.82, "text": "진짜 X-ray 안경 쓴 것처럼 내가 왜 이 게임에 미쳐 있었는지"}, {"start": 858.82, "end": 860.7, "text": "투명하게 보일 것 같아요"}, {"start": 860.7, "end": 864.38, "text": "자, 그런데 여러분 여기서 이 딥 다이브 마치기 전에"}, {"start": 864.38, "end": 866.66, "text": "여러분의 삶을 향해 조금은 도발적이고"}, {"start": 866.66, "end": 869.46, "text": "묵직한 질문 하나 던지고 싶습니다"}, {"start": 869.46, "end": 872.26, "text": "우리는 지금까지 화면 속 가상세계를 통제하는"}, {"start": 872.26, "end": 874.06, "text": "시내 시점을 파헤쳐 봤잖아요"}, {"start": 874.06, "end": 876.38, "text": "그렇죠, 완벽하게 설계된 세계니까요"}, {"start": 876.38, "end": 879.42, "text": "그렇다면 우리가 매일 두 발 딥고 사는"}, {"start": 879.42, "end": 881.5, "text": "이 현실은 어떨까요?"}, {"start": 881.5, "end": 885.9, "text": "매일 피곤한 몸 이끌고 만원 지하철에 몸 실고 출근해서"}, {"start": 885.9, "end": 888.22, "text": "모니터 앞에서 영혼 갈아놓고"}, {"start": 888.22, "end": 890.82, "text": "한 달에 한 번 월급이라는 보상 얻어서"}, {"start": 890.86, "end": 894.82, "text": "대출이자 갚는 이 챗바퀴 같은 일상의 핵심 사이클"}, {"start": 894.82, "end": 898.74, "text": "과연 이 루프 여러분 스스로 온전히 기획하신 건가요?"}, {"start": 898.74, "end": 900.86, "text": "참 뜨끔해지는 질문이네요"}, {"start": 900.86, "end": 905.0600000000001, "text": "혹시 나도 모르는 사이에 타인이 치밀하게 설계해놓은"}, {"start": 905.0600000000001, "end": 907.5400000000001, "text": "거대한 자본주의 세계관 속에서"}, {"start": 907.5400000000001, "end": 909.86, "text": "다음 단계로 나아가지도 못하고"}, {"start": 909.86, "end": 912.1800000000001, "text": "그저 무의미한 자원만 소모하는"}, {"start": 912.1800000000001, "end": 914.6600000000001, "text": "영원한 데드락에 빠져 있는 건 아닐까요?"}, {"start": 914.6600000000001, "end": 917.1, "text": "오늘 하루쯤은 잠시 멈춰서서"}, {"start": 917.1, "end": 919.34, "text": "나라는 사람의 남은 인생을 관통하는"}, {"start": 919.38, "end": 922.0600000000001, "text": "진짜 중심 테마는 대체 무엇인지"}, {"start": 922.0600000000001, "end": 924.1800000000001, "text": "나는 내 삶의 기획자인지"}, {"start": 924.1800000000001, "end": 927.02, "text": "아니면 남의 게임 속 NPC인지"}, {"start": 927.02, "end": 929.7, "text": "한 번쯤 고민해 보셨으면 좋겠습니다"}, {"start": 929.7, "end": 932.6600000000001, "text": "지금까지 여러분과 함께한 뜻깊은 시간이었습니다"}];

let currentSlide = 0;
let isAutoSync = true;
let lastSubIdx = -1;
const audio = document.getElementById('audio');
const playBtn = document.getElementById('play-btn');
const ICON_PLAY  = '<svg width="12" height="14" viewBox="0 0 12 14" fill="none"><path d="M1 1.5L11 7L1 12.5V1.5Z" fill="currentColor"/></svg>';
const ICON_PAUSE = '<svg width="12" height="14" viewBox="0 0 12 14" fill="none"><rect x="1" y="1" width="3.5" height="12" rx="1" fill="currentColor"/><rect x="7.5" y="1" width="3.5" height="12" rx="1" fill="currentColor"/></svg>';
const timeDisplay = document.getElementById('time-display');
const seekBar = document.getElementById('seek-bar');

// 오디오 포함 슬라이드를 시작시간 순으로 정렬한 인덱스 (동기화용)
const audioSlides = SLIDES
    .map((s, i) => ({idx: i, start: s.start, end: s.end, hasAudio: s.hasAudio}))
    .filter(s => s.hasAudio && s.start !== null)
    .sort((a, b) => a.start - b.start);

function init() {
    buildNav();
    buildIndex();
    buildAudioMap();
    showSlide(0);
    audio.addEventListener('timeupdate', onTimeUpdate);
    // 오디오 메타데이터 로드 시 시크바 max 갱신
    audio.addEventListener('loadedmetadata', updateSeekBarMax);
    audio.addEventListener('durationchange', updateSeekBarMax);
    // canplay 이벤트도 대비 (일부 브라우저/포맷에서 loadedmetadata가 늦게 발생)
    audio.addEventListener('canplay', updateSeekBarMax);
    // 슬라이더 드래그 시: 오디오 위치 이동 + 즉시 슬라이드 동기화
    seekBar.addEventListener('input', () => {
        audio.currentTime = seekBar.value;
        isAutoSync = true;
        syncSlideToTime(audio.currentTime);
        updateSubtitle(audio.currentTime);
    });
    // 일시정지 상태에서 seek 완료 시에도 슬라이드 동기화
    audio.addEventListener('seeked', () => {
        syncSlideToTime(audio.currentTime);
        updateTimeDisplay();
        updateSubtitle(audio.currentTime);
    });
}

function updateSeekBarMax() {
    if (audio.duration && isFinite(audio.duration)) {
        seekBar.max = audio.duration;
        updateTimeDisplay();
    }
}

function buildNav() {
    const nav = document.getElementById('slide-nav');
    SLIDES.forEach((slide, i) => {
        const dot = document.createElement('button');
        dot.className = 'nav-dot ' + (slide.hasAudio ? 'has-audio' : 'no-audio');
        dot.textContent = slide.id.replace('P', '');
        dot.title = slide.id + ' — ' + slide.title;
        dot.onclick = () => { isAutoSync = false; showSlide(i); };
        nav.appendChild(dot);
    });
}

function buildIndex() {
    const list = document.getElementById('index-list');
    SLIDES.forEach((slide, i) => {
        const item = document.createElement('div');
        item.className = 'index-item' + (slide.hasAudio ? ' has-audio' : '');
        item.innerHTML = '<span class="idx-id">' + slide.id + '</span><span class="idx-title">' + slide.title + '</span>';
        item.onclick = () => { isAutoSync = false; showSlide(i); };
        list.appendChild(item);
    });
}

function buildAudioMap() {
    const map = document.getElementById('audio-map');
    if (!map) return;
    let prevEnd = 0;
    audioSlides.forEach((s, i) => {
        const slide = SLIDES[s.idx];
        const duration = s.end - s.start;
        // 시간 갭이 있으면 빈 공간 삽입
        if (s.start > prevEnd + 1) {
            const gap = document.createElement('div');
            gap.className = 'map-gap';
            gap.style.flexGrow = (s.start - prevEnd).toFixed(1);
            map.appendChild(gap);
        }
        const seg = document.createElement('div');
        seg.className = 'map-segment';
        seg.dataset.idx = s.idx;
        seg.style.flexGrow = duration.toFixed(1);
        seg.textContent = slide.id;
        seg.title = slide.id + ' — ' + slide.title;
        seg.onclick = () => {
            audio.currentTime = s.start;
            isAutoSync = true;
            syncSlideToTime(s.start);
        };
        map.appendChild(seg);
        prevEnd = s.end;
    });
}

function updateAudioMap(currentIdx) {
    document.querySelectorAll('.map-segment').forEach(seg => {
        seg.classList.toggle('active', parseInt(seg.dataset.idx) === currentIdx);
    });
}

function showSlide(index) {
    if (index < 0 || index >= SLIDES.length) return;
    currentSlide = index;
    const slide = SLIDES[index];
    document.getElementById('slide-id').textContent = slide.id;
    document.getElementById('slide-title').textContent = slide.title;
    const contentEl = document.getElementById('slide-content');
    contentEl.style.animation = 'none';
    contentEl.offsetHeight; // 리플로우 트리거
    contentEl.style.animation = '';
    contentEl.innerHTML = slide.content;
    const badge = document.getElementById('slide-badge');
    if (slide.hasAudio) {
        badge.textContent = '🎵 오디오 포함';
        badge.className = 'badge-audio';
    } else {
        badge.textContent = '📖 교안 전용';
        badge.className = 'badge-no-audio';
    }
    // 네비게이션 도트 활성화
    document.querySelectorAll('.nav-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === index);
    });
    // 인덱스 패널 활성화
    document.querySelectorAll('.index-item').forEach((item, i) => {
        item.classList.toggle('active', i === index);
        if (i === index) item.scrollIntoView({block: 'nearest', behavior: 'smooth'});
    });
    // 오디오 맵 활성화
    updateAudioMap(index);

    window.scrollTo({top: 0, behavior: 'smooth'});
}

// 시간 기반 슬라이드 동기화 (정렬된 audioSlides 사용)
function syncSlideToTime(t) {
    let targetIdx = -1;
    for (let i = audioSlides.length - 1; i >= 0; i--) {
        if (t >= audioSlides[i].start) {
            targetIdx = audioSlides[i].idx;
            break;
        }
    }
    if (targetIdx >= 0 && targetIdx !== currentSlide) {
        showSlide(targetIdx);
    }
}

function onTimeUpdate() {
    const t = audio.currentTime;
    seekBar.value = t;
    updateTimeDisplay();
    updateSubtitle(t);
    if (!isAutoSync) return;
    syncSlideToTime(t);
}

function updateTimeDisplay() {
    const cur = formatTime(audio.currentTime);
    const dur = formatTime(audio.duration || 0);
    timeDisplay.textContent = cur + ' / ' + dur;
}

function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
}

function togglePlay() {
    if (audio.paused) {
        audio.play();
        playBtn.innerHTML = ICON_PAUSE;
        isAutoSync = true;
    } else {
        audio.pause();
        playBtn.innerHTML = ICON_PLAY;
    }
}

function changeSpeed(val) {
    audio.playbackRate = parseFloat(val);
}

function skipTime(sec) {
    audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + sec));
}

document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowLeft') { showSlide(currentSlide - 1); isAutoSync = false; }
    if (e.code === 'ArrowRight') { showSlide(currentSlide + 1); isAutoSync = false; }
});

function updateSubtitle(t) {
    if (typeof TRANSCRIPT === 'undefined' || TRANSCRIPT.length === 0) return;
    const idx = findTranscriptIdx(t);
    if (idx === lastSubIdx) return;
    lastSubIdx = idx;
    const el = document.getElementById('subtitle-text');
    if (el) el.textContent = idx >= 0 ? TRANSCRIPT[idx].text : '';
}

function findTranscriptIdx(t) {
    let lo = 0, hi = TRANSCRIPT.length - 1, result = -1;
    while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (TRANSCRIPT[mid].start <= t) { result = mid; lo = mid + 1; }
        else { hi = mid - 1; }
    }
    if (result >= 0 && t <= TRANSCRIPT[result].end) return result;
    return -1;
}

init();
// 모바일 목차 오버레이
function buildOverlayIndex() {
    const list = document.getElementById('index-overlay-list');
    if (!list) return;
    SLIDES.forEach((slide, i) => {
        const item = document.createElement('div');
        item.className = 'index-item' + (slide.hasAudio ? ' has-audio' : '');
        item.innerHTML = '<span class="idx-id">' + slide.id + '</span><span class="idx-title">' + slide.title + '</span>';
        item.onclick = () => { isAutoSync = false; showSlide(i); closeOverlay(); };
        list.appendChild(item);
    });
}

function openOverlay() {
    const ov = document.getElementById('index-overlay');
    ov.classList.add('open');
    const items = document.querySelectorAll('#index-overlay-list .index-item');
    items.forEach((item, i) => {
        item.classList.toggle('active', i === currentSlide);
        if (i === currentSlide) item.scrollIntoView({block: 'center', behavior: 'smooth'});
    });
}

function closeOverlay() {
    document.getElementById('index-overlay').classList.remove('open');
}

buildOverlayIndex();

</script>

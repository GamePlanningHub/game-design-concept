<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3. 게임 디자인 / 컨셉 기획 ⭐⭐⭐</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
    --bg-void: #08090d;
    --bg-surface: #0e1019;
    --bg-elevated: #141722;
    --bg-card: #181c2a;
    --bg-glass: rgba(20, 23, 34, 0.75);
    --border-subtle: rgba(255,255,255,0.04);
    --border-dim: rgba(255,255,255,0.08);
    --border-accent: rgba(129,140,248,0.3);
    --text-primary: #eaedf3;
    --text-secondary: #8b95a8;
    --text-muted: #5a6478;
    --accent: #818cf8;
    --accent-glow: rgba(129,140,248,0.15);
    --accent-bright: #a5b4fc;
    --gold: #f0c040;
    --gold-dim: rgba(240,192,64,0.12);
    --green: #6ee7a0;
    --green-dim: rgba(110,231,160,0.1);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.1);
    --radius: 12px;
    --radius-sm: 8px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg-void);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
}

/* 배경 그라디언트 앰비언트 */
body::before {
    content: '';
    position: fixed; inset: 0; z-index: -1;
    background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(129,140,248,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(240,192,64,0.03) 0%, transparent 50%);
}

/* ========== 오디오 바 (Glass Morphism) ========== */
#audio-bar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg-glass);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border-bottom: 1px solid var(--border-subtle);
    padding: 14px 24px;
}
#audio-controls {
    display: flex; align-items: center; gap: 14px;
    max-width: 860px; margin: 0 auto;
}
#play-btn {
    background: var(--accent);
    border: none; color: #fff;
    width: 40px; height: 40px; border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px var(--accent-glow), 0 2px 8px rgba(0,0,0,0.3);
    transition: var(--transition);
    flex-shrink: 0;
}
#play-btn svg { display: block; }
#play-btn:hover {
    background: var(--accent-bright);
    transform: scale(1.08);
    box-shadow: 0 0 30px rgba(129,140,248,0.3), 0 4px 12px rgba(0,0,0,0.4);
}
.skip-btn {
    background: transparent;
    border: 1px solid var(--border-dim);
    color: var(--text-muted);
    width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
    flex-shrink: 0;
}
.skip-btn svg { display: block; }
.skip-btn:hover {
    background: var(--surface-hover);
    color: var(--text-primary);
}
#time-display {
    color: var(--text-muted); font-size: 12px;
    min-width: 90px; font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
}

/* 커스텀 시크바 */
#seek-bar {
    flex: 1; height: 4px;
    -webkit-appearance: none; appearance: none;
    background: var(--border-dim);
    border-radius: 2px; outline: none;
    cursor: pointer; transition: height 0.15s ease;
}
#seek-bar:hover { height: 6px; }
#seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
    cursor: pointer;
    transition: var(--transition);
}
#seek-bar::-webkit-slider-thumb:hover {
    transform: scale(1.3);
    box-shadow: 0 0 16px rgba(129,140,248,0.4);
}
#seek-bar::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%; border: none;
    background: var(--accent);
    cursor: pointer;
}

#speed-select {
    background: var(--bg-elevated); color: var(--text-secondary);
    border: 1px solid var(--border-dim);
    border-radius: 6px; padding: 5px 10px;
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    cursor: pointer; outline: none;
    transition: var(--transition);
}
#speed-select:hover { border-color: var(--accent); }

/* ========== 슬라이드 네비게이션 ========== */
#slide-nav {
    display: flex; gap: 3px; padding: 12px 24px;
    overflow-x: auto; background: var(--bg-surface);
    border-bottom: 1px solid var(--border-subtle);
    justify-content: center; flex-wrap: wrap;
    scrollbar-width: none;
}
#slide-nav::-webkit-scrollbar { display: none; }

.nav-dot {
    width: 34px; height: 30px; border-radius: 6px;
    border: 1px solid transparent; cursor: pointer;
    font-size: 11px; font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
    position: relative;
}
.nav-dot.has-audio {
    background: rgba(129,140,248,0.08); color: var(--accent);
    border-color: rgba(129,140,248,0.12);
}
.nav-dot.no-audio {
    background: rgba(255,255,255,0.02); color: var(--text-muted);
    opacity: 0.5;
}
.nav-dot:hover {
    opacity: 1;
    transform: translateY(-1px);
    border-color: var(--accent);
}
.nav-dot.active {
    background: var(--accent); color: #fff;
    transform: translateY(-2px) scale(1.05); opacity: 1;
    box-shadow: 0 4px 16px var(--accent-glow);
    border-color: transparent;
}

/* 슬라이드 전환 애니메이션 */
@keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
}
#slide-content {
    animation: slideIn 0.35s ease-out;
}

#slide-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
#slide-id {
    color: var(--accent); font-size: 11px; letter-spacing: 3px;
    font-weight: 500; text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
}
#slide-badge {
    font-size: 10px; padding: 3px 10px; border-radius: 20px;
    font-weight: 500; letter-spacing: 0.3px;
}
.badge-audio {
    background: var(--green-dim); color: var(--green);
    border: 1px solid rgba(110,231,160,0.15);
}
.badge-no-audio {
    background: var(--red-dim); color: var(--red);
    border: 1px solid rgba(248,113,113,0.12);
}

#slide-title {
    font-size: 26px; font-weight: 900; color: #fff;
    margin-bottom: 32px; line-height: 1.5;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border-dim);
    letter-spacing: -0.3px;
}

/* ========== 슬라이드 콘텐츠 블록 ========== */

.slide-text {
    color: var(--text-secondary); font-size: 14.5px;
    line-height: 2; margin-bottom: 20px;
    font-weight: 300;
}
.slide-text strong {
    color: var(--gold); font-weight: 500;
    background: var(--gold-dim);
    padding: 1px 5px; border-radius: 3px;
}
.slide-text em {
    color: var(--accent-bright); font-style: normal; font-weight: 400;
}

/* 인용 블록 */
.slide-quote {
    background: var(--bg-card);
    border-left: 2px solid var(--accent);
    padding: 18px 22px; margin-bottom: 16px;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    color: var(--text-primary); font-size: 14px;
    line-height: 1.85; font-weight: 300;
}
.slide-quote strong {
    color: var(--gold); font-weight: 500;
}

/* 포인트 리스트 */
.slide-points {
    list-style: none; margin-bottom: 20px; padding-left: 0;
    display: flex; flex-direction: column; gap: 6px;
}
.slide-points li {
    position: relative;
    padding: 12px 16px 12px 36px;
    background: var(--bg-elevated);
    border-radius: var(--radius-sm);
    font-size: 13.5px; line-height: 1.7;
    color: var(--text-secondary); font-weight: 300;
    border: 1px solid var(--border-subtle);
    transition: var(--transition);
}
.slide-points li:hover {
    border-color: var(--border-accent);
    background: var(--bg-card);
}
.slide-points li::before {
    content: '';
    position: absolute; left: 15px; top: 50%;
    transform: translateY(-50%);
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent-glow);
}
.slide-points li strong {
    color: var(--gold); font-weight: 500;
}

/* 노트 블록 (aside) */
.slide-note {
    display: flex; gap: 14px; align-items: flex-start;
    background: var(--bg-elevated);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius);
    padding: 18px 20px; margin-top: 28px;
    position: relative; overflow: hidden;
}
.slide-note::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent));
    opacity: 0.5;
}
.note-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
.note-content {
    color: var(--text-secondary); font-size: 13px;
    line-height: 1.8; font-weight: 300;
}
.note-content strong { color: var(--text-primary); font-weight: 500; }

/* 이미지 */
.slide-image {
    margin-bottom: 20px; text-align: center;
}
.slide-image img {
    max-width: 100%; border-radius: var(--radius);
    border: 1px solid var(--border-dim);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

/* ========== 정의 카드 (> **제목** 본문 패턴) ========== */
.slide-def-card {
    background: var(--bg-card);
    border-left: 2px solid var(--accent);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 18px 22px;
    margin-bottom: 12px;
    transition: var(--transition);
}
.slide-def-card:hover {
    border-left-color: var(--gold);
    background: rgba(24,28,42,0.9);
}
.def-title {
    color: var(--gold); font-size: 14.5px; font-weight: 700;
    margin-bottom: 8px; letter-spacing: 0.2px;
}
.def-desc {
    color: var(--text-secondary); font-size: 13.5px;
    line-height: 1.8; font-weight: 300;
}
.def-desc strong { color: var(--text-primary); font-weight: 500; }

/* ========== 섹션 카드 (**볼드 헤더** + 본문) ========== */
.slide-card {
    background: var(--bg-elevated);
    border-radius: var(--radius-sm);
    padding: 16px 20px;
    margin-bottom: 10px;
    border: 1px solid var(--border-subtle);
    transition: var(--transition);
}
.slide-card:hover {
    border-color: var(--border-accent);
    transform: translateX(3px);
}
.card-heading {
    color: var(--gold); font-size: 14px; font-weight: 700;
    margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
}
.card-heading::before {
    content: ''; display: inline-block;
    width: 3px; height: 14px;
    background: var(--accent); border-radius: 2px;
    flex-shrink: 0;
}
.card-desc {
    color: var(--text-secondary); font-size: 13px;
    line-height: 1.8; font-weight: 300;
    padding-left: 11px;
}
.card-desc strong { color: var(--text-primary); font-weight: 500; }
.card-desc em { color: var(--accent-bright); font-style: normal; }

/* ========== 오디오 구간 맵 (재생바 아래 타임라인) ========== */
#audio-map {
    max-width: 860px; margin: 8px auto 0;
    height: 26px;
    display: flex;
    gap: 1px;
    border-radius: 4px;
    overflow: hidden;
    background: var(--bg-elevated);
}
.map-segment {
    height: 100%;
    min-width: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: filter 0.15s;
    overflow: hidden;
    white-space: nowrap;
    padding: 0 2px;
}
.map-segment:hover {
    filter: brightness(1.3);
    z-index: 1;
}
.map-segment.active {
    filter: brightness(1.4);
    color: #fff;
    font-weight: 700;
}
/* 구간별 색상 (순서대로 순환) — gap 요소 제외 */
.map-segment:nth-of-type(odd)  { background: rgba(129,140,248,0.35); }
.map-segment:nth-of-type(even) { background: rgba(240,192,64,0.25); }
.map-gap {
    height: 100%;
    background: var(--bg-elevated);
}

/* ========== 메인 레이아웃 (콘텐츠 + 인덱스) ========== */
#main-layout {
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
}
#slide-area {
    flex: 1;
    min-width: 0;
}
#slide-container {
    max-width: 800px; margin: 0 auto;
    padding: 40px 28px 80px;
}

/* ========== 인덱스 패널 (우측 사이드바) ========== */
#index-panel {
    width: 240px;
    flex-shrink: 0;
    border-left: 1px solid var(--border-subtle);
    background: var(--bg-surface);
    position: sticky;
    top: 80px;
    height: calc(100vh - 80px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-dim) transparent;
}
#index-panel::-webkit-scrollbar { width: 4px; }
#index-panel::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 2px; }

#index-header {
    padding: 16px 16px 10px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    border-bottom: 1px solid var(--border-subtle);
}

.index-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 8px 16px;
    cursor: pointer;
    transition: var(--transition);
    border-left: 2px solid transparent;
    font-size: 12px;
    line-height: 1.5;
}
.index-item:hover {
    background: var(--bg-elevated);
    border-left-color: var(--border-accent);
}
.index-item.active {
    background: var(--bg-card);
    border-left-color: var(--accent);
}
.index-item .idx-id {
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    flex-shrink: 0;
    min-width: 28px;
}
.index-item .idx-title {
    color: var(--text-secondary);
    font-weight: 300;
}
.index-item.active .idx-title {
    color: var(--text-primary);
    font-weight: 400;
}
.index-item.has-audio .idx-id::after {
    content: ' ♪';
    color: var(--green);
    font-size: 8px;
}

/* ========== 반응형 ========== */
@media (max-width: 900px) {
    #index-panel { display: none; }
    #main-layout { display: block; }
    #audio-map { margin-top: 12px; }
}
@media (max-width: 640px) {
    /* 오디오 바 */
    #audio-bar { padding: 10px 12px; }
    #audio-map { margin-top: 16px; }
    #audio-controls { gap: 6px; }
    #play-btn { width: 36px; height: 36px; font-size: 14px; }
    .skip-btn { width: 30px; height: 30px; font-size: 11px; }
    #time-display { min-width: 70px; font-size: 10px; }
    #speed-select { padding: 4px 6px; font-size: 10px; }

    /* 네비게이션 도트: 가로 스크롤 */
    #slide-nav {
        flex-wrap: nowrap;
        justify-content: flex-start;
        padding: 8px 12px;
        gap: 2px;
    }
    .nav-dot { width: 28px; height: 26px; font-size: 9px; flex-shrink: 0; }

    /* 슬라이드 영역 */
    #slide-container { padding: 20px 14px 80px; }
    #slide-title { font-size: 20px; margin-bottom: 20px; padding-bottom: 14px; }
    #slide-header { gap: 8px; margin-bottom: 8px; }
    #slide-id { font-size: 10px; }
    #slide-badge { font-size: 9px; padding: 2px 8px; }

    /* 콘텐츠 블록 */
    .slide-text { font-size: 13.5px; line-height: 1.9; }
    .slide-card { padding: 16px; }
    .slide-def-card { padding: 14px; }
    .slide-note { padding: 14px 16px; font-size: 12.5px; }
    .slide-points li { font-size: 13.5px; }
    .slide-image img { max-height: 50vh; }

    /* 자막 바 */
    #subtitle-bar { padding: 10px 14px; }
    #subtitle-text { font-size: 0.9rem; }
}

/* 자막 바 */
#subtitle-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    text-align: center;
    padding: 14px 24px;
    background: rgba(0, 0, 0, 0.82);
    z-index: 1000;
    pointer-events: none;
    min-height: 24px;
}

#subtitle-text {
    color: #f0f0f0;
    font-size: 1.05rem;
    line-height: 1.5;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.7);
    transition: opacity 0.15s ease;
}

#subtitle-bar:empty,
#subtitle-bar:has(#subtitle-text:empty) {
    opacity: 0;
}

/* ========== 모바일 목차 FAB + 오버레이 ========== */
#index-fab {
    display: none;
    position: fixed;
    bottom: 76px; right: 20px;
    z-index: 1100;
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 1px solid var(--border-dim);
    background: var(--bg-elevated);
    color: var(--text-secondary);
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    transition: var(--transition);
    align-items: center; justify-content: center;
}
#index-fab:hover {
    background: var(--accent);
    color: #fff;
    border-color: transparent;
}
@media (max-width: 900px) {
    #index-fab { display: flex; }
}

#index-overlay {
    display: none;
    position: fixed; inset: 0;
    z-index: 1200;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
}
#index-overlay.open { display: flex; justify-content: flex-end; }

#index-overlay-panel {
    width: min(320px, 85vw);
    height: 100%;
    background: var(--bg-surface);
    border-left: 1px solid var(--border-subtle);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-dim) transparent;
    animation: slideInRight 0.25s ease-out;
}
@keyframes slideInRight {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
}
#index-overlay-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px;
    border-bottom: 1px solid var(--border-subtle);
}
#index-overlay-header span {
    font-size: 11px; font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
}
#index-overlay-close {
    background: transparent; border: none;
    color: var(--text-muted); font-size: 22px;
    cursor: pointer; padding: 4px 8px;
    border-radius: 6px;
    transition: var(--transition);
}
#index-overlay-close:hover {
    background: var(--bg-elevated); color: var(--text-primary);
}
#index-overlay-list .index-item {
    padding: 12px 16px;
}

</style>
</head>
<body>
<div id="app">
  <div id="audio-bar">
    <audio id="audio" src="컨셉부터_세계관까지_탄탄한_게임_기획.m4a" preload="auto"></audio>
    <div id="audio-controls">
      <button class="skip-btn" onclick="skipTime(-10)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="2.5" height="12" rx="1" fill="currentColor"/><path d="M13 1.5L5 7L13 12.5V1.5Z" fill="currentColor"/></svg></button>
      <button id="play-btn" onclick="togglePlay()"><svg width="12" height="14" viewBox="0 0 12 14" fill="none"><path d="M1 1.5L11 7L1 12.5V1.5Z" fill="currentColor"/></svg></button>
      <button class="skip-btn" onclick="skipTime(10)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1.5L9 7L1 12.5V1.5Z" fill="currentColor"/><rect x="10.5" y="1" width="2.5" height="12" rx="1" fill="currentColor"/></svg></button>
      <span id="time-display">0:00 / 0:00</span>
      <input type="range" id="seek-bar" min="0" max="86400" value="0" step="0.1">
      <select id="speed-select" onchange="changeSpeed(this.value)">
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>

  {

    "title": "컨셉을 구성하는 3대 요소",
    "content": "<div class=\"slide-text\">컨셉은 다음 세 가지 질문에 대한 답이 합쳐졌을 때 완성된다.</div>\n<ul class=\"slide-points\"><li><strong>경험 (Experience)</strong></li></ul>\n<div class=\"slide-card\"><div class=\"card-heading\">어떤 기분을 느끼게 할 것인가?</div><div class=\"card-desc\">유저가 게임을 하며 느낄 핵심 감정</div></div>\n<ul class=\"slide-points\"><li>압도적인 공포</li><li>짜릿한 속도감</li><li>평화로운 힐링</li></ul>\n<ul class=\"slide-points\"><li><strong>테마(Theme)</strong></li></ul>\n<div class=\"slide-card\"><div class=\"card-heading\">어떤 옷을 입힐 것인가?</div><div class=\"card-desc\">게임의 배경과 소재</div></div>\n<ul class=\"slide-points\"><li>중세 판타지</li><li>사이버 펑크</li><li>1920년대 탐정물</li></ul>\n<ul class=\"slide-points\"><li><strong>매커니즘(Mechanism)</strong></li></ul>\n<div class=\"slide-card\"><div class=\"card-heading\">무엇을 하며 노는가?</div><div class=\"card-desc\">핵심 규칙과 상호작용</div></div>\n<ul class=\"slide-points\"><li>블록 쌓기</li><li>카드 덱 빌딩</li><li>잠입 액션</li></ul>",

    "hasAudio": true,
    "start": 329.0,
    "end": 357.0
  },
  {

    "title": "컨셉 기획?",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">정의 :</div><div class=\"card-desc\">컨셉을 바탕으로 게임의 방향성을 결정하는 기획</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">진행 시점:</div><div class=\"card-desc\">시스템, 컨텐츠 기획의 시작 단계에서 진행</div></div>\n<div class=\"slide-text\">게임의 컨셉뿐만 아니라 <strong>시스템이나 컨텐츠를 기획할 때에도 컨셉이 필요하다.</strong></div>\n<div class=\"slide-card\"><div class=\"card-heading\">예시1.</div><div class=\"card-desc\">몬스터의 소재로 다양한 장비를 만들 수 있는 제작 컨텐츠 → 몬스터 헌터 제작</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">예시2.</div><div class=\"card-desc\">강화할수록 장비의 가치와 희소성을 높여주는 강화 컨텐츠(시스템) → 리니지라이크 강화</div></div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\">컨텐츠 또는 시스템의 컨셉은 게임의 메인컨셉과 그 결이 맞는지 <strong>‘라벨링’</strong> 하는 역할도 띤다!</div></div>",

    "hasAudio": true,
    "start": 384.0,
    "end": 406.0
  },
  {
    "id": "P10",
    "title": "컨셉 기획을 통해 정해질 수 있는 사항",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">게임 세계관</div><div class=\"card-desc\">게임이 펼쳐지는 세계의 배경과 설정</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">주요 시스템</div><div class=\"card-desc\">게임을 구성하는 핵심 메커니즘</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">게임 스토리</div><div class=\"card-desc\">플레이어가 경험할 서사 구조</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">개발 스펙</div><div class=\"card-desc\">세부 개발 사양 및 대략적인 작업 규모</div></div>",
    "hasAudio": true,
    "start": 406.0,
    "end": 420.0
  },
  {
    "id": "P11",
    "title": "중심 테마",
    "content": "<div class=\"slide-text\">중심 테마란 무엇인가?<br><strong>게임에서 전달하고자 하는 메시지와 기획 의도입니다.</strong></div>\n<div class=\"slide-card\"><div class=\"card-heading\">컨셉:</div><div class=\"card-desc\">무엇을 만들 것인가? → 플레이어의 <strong>손과 눈이 무엇을 하는가?</strong></div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">중심</div><div class=\"card-desc\"><strong>테마:</strong> 어떤 가치(감정)를 전달할 것인가? → 플레이어의 <strong>마음에 무엇이 남는가?</strong></div></div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\">**테마 와 중심테마는 다르다!!!<br>→** 테마를 통해서 중심 테마를 이끌어 내는 것이다!</div></div>",
    "hasAudio": true,
    "start": 420.0,

  },
  {
    "id": "P12",
    "title": "같은 컨셉, 다른 중심 테마",
    "content": "<div class=\"slide-text\">컨셉이 같더라도 중심 테마가 다르면 완전히 다른 게임이 된다.</div>\n<div class=\"slide-def-card\"><div class=\"def-title\">공통 컨셉</div><div class=\"def-desc\">좀비가 가득한 도시에서 살아남는 생존 액션 게임</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">중심 테마 A : 처절한 이기심</div><div class=\"card-desc\">생존을 위한 처절한 이기심을 강조</div></div>\n<ul class=\"slide-points\"><li>자원이 극도로 부족</li><li>동료를 배신해야 내가 살 수 있는 선택지 부여</li><li>생존자 간의 긴장과 불신</li></ul>\n<div class=\"slide-card\"><div class=\"card-heading\">중심 테마 B : 절망 속의 인간애</div><div class=\"card-desc\">절망 속에서도 피어나는 인간애</div></div>\n<ul class=\"slide-points\"><li>혼자서는 절대 깰 수 없는 구조</li><li>서로 도와야만 보상을 얻는 협력 시스템</li><li>생존자 간의 유대와 신뢰</li></ul>\n<div class=\"slide-card\"><div class=\"card-heading\">컨셉</div><div class=\"card-desc\">은 게임의 장르와 특징을 말하고, <strong>중심 테마</strong>는 그 게임이 유저에게 어떤 의미를 줄 지 결정한다.</div></div>",

    "title": "컨셉과 중심 테마는 굳이 왜 나누어 생각할까?",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">기획의 일관성</div><div class=\"card-desc\">”이 시스템이 재미있긴 한데, 우리 게임의 중심 테마와 어울리나?” 라는 질문이 가능하다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">차별화</div><div class=\"card-desc\">좀비 게임은 세상에 널렸지만 “기억을 잃어가는 좀비의 슬픔”이라는 테마를 가진 좀비 게임은 독보적이다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">팀원 설득력</div><div class=\"card-desc\">”우리의 중심 테마는 ‘고독’이니 배경을 더 황량하게 표현해 주세요” 라고 명확하게 요청할 수 있다.</div></div>",

    "start": 476.0,
    "end": 483.0

  {
    "id": "P14",
    "title": "중심 테마의 예시",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">모던 워페어</div></div>\n<div class=\"slide-quote\">실제 전장의 긴장감과 고통까지 전달</div>\n<div class=\"slide-text\">단순한 슈팅 액션을 넘어 전쟁의 무게감과 도덕적 딜레마를 전달하는 게임입니다. 현실적인 전투 상황과 민간인 보호 같은 요소를 통해 전쟁의 복잡성을 경험하게 한다. → Ex) <strong>리멤버 노 러시안</strong></div>\n<div class=\"slide-card\"><div class=\"card-heading\">바이오 해저드</div></div>\n<div class=\"slide-quote\">이윤만을 추구하는 기업이 어디까지 갈 수 있는가?</div>\n<div class=\"slide-text\">단순한 좀비 호러를 넘어 기업의 탐욕이 초래한 재앙을 다룬다. 엄브렐라사의 비윤리적 실험과 그 결과로 벌어지는 참사를 통해 자본주의의 어두운 면을 조명한다.</div>\n<div class=\"slide-card\"><div class=\"card-heading\">문명 온라인</div></div>\n<div class=\"slide-quote\">유저 스스로 선택하고 만들어가는 세상</div>\n<div class=\"slide-text\">플레이어의 모든 선택이 세계의 역사를 만들어간다. 문명의 발전 방향, 외교 관계, 전쟁과 평화 등 모든 것이 플레이어의 손에 달려 있어 진정한 샌드박스 경험을 제공한다.</div>",
    "hasAudio": true,
    "start": 483.0,
    "end": 497.0
  },
  {
    "id": "P15",
    "title": "중심 테마의 중요성",
    "content": "<ul class=\"slide-points\"><li><strong>일관된 표현</strong> 테마는 게임 플레이의 전반에 걸쳐 표현되어야 한다. 테마와 실제 게임이 따로 놀면 안된다.</li></ul>\n<ul class=\"slide-points\"><li><strong>컨텐츠 파생</strong> 테마를 통해 게임의 스토리와 컨텐츠, 시스템이 파생된다.</li></ul>\n<div class=\"slide-card\"><div class=\"card-heading\">예시 1: 커피 가게 운영</div><div class=\"card-desc\">나만의 커피 가게를 운영하는 게임이니까… → 단골 손님을 만들어 가는 시스템은 어떨까?</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">예시 2: 전장의 긴장감</div><div class=\"card-desc\">실제 전장의 긴장감을 표현하는 게임이니까… → 부상을 당하면 땀과 피로 화면을 뿌옇게 만들자!</div></div>",
    "hasAudio": true,
    "start": 497.0,
    "end": 516.0
  },
  {
    "id": "P16",
    "title": "이 컨셉의 핵심이 뭐야?",
    "content": "<div class=\"slide-text\">모든 게임에는 플레이어를 사로잡는 <strong>핵심 요소</strong>가 있다.</div>",
    "hasAudio": true,
    "start": 516.0,
    "end": 528.0
  },
  {
    "id": "P17",
    "title": "핵심 컨텐츠?",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">정의</div><div class=\"card-desc\">중심 테마를 가장 잘 느낄 수 있는 게임 컨텐츠. 유저가 해당 게임을 선택하고 즐기게 되는 가장 핵심적이고 차별적인 컨텐츠이다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">관점의 차이</div><div class=\"card-desc\">컨셉 단계에서의 핵심 컨텐츠는 게임 디자인 관점이 아니라 유저 관점에서의 컨텐츠이다. 컨텐츠, 시스템, 레벨 디자인, 밸런싱 등이 모두 합쳐진 게임의 즐길거리를 의미한다.</div></div>\n<div class=\"slide-text\">대부분의 게임에서 모든 컨텐츠는 핵심 컨텐츠를 중심으로 배치된다.</div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\"><strong>핵심 컨텐츠의 성공 = 해당 게임의 성공</strong><br>(예외도 있긴 하다.)</div></div>",
    "hasAudio": true,
    "start": 528.0,
    "end": 535.0
  },
  {
    "id": "P18",
    "title": "핵심 컨텐츠는 게임의 정체성을 결정한다.",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">Ex : 리니지의 공성전</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">혈맹 결속력</div><div class=\"card-desc\">혈맹이라는 유저 모임의 결속력 강화</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">혈맹 간 경쟁</div><div class=\"card-desc\">혈맹 간의 경쟁 심화로 장기 플레이 유도</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">하드코어 유저</div><div class=\"card-desc\">게임 이해도가 높고 접속 시간이 긴 유저가 게임을 주도</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">거래 활성화</div><div class=\"card-desc\">캐릭터, 아이템 거래 급증</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">부작용 :</div><div class=\"card-desc\">작업장, 봇, 오토 프로그램의 난입</div></div>",
    "hasAudio": true,
    "start": 535.0,
    "end": 559.0
  },
  {
    "id": "P19",
    "title": "핵심 컨텐츠와 주변 컨텐츠",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">확장성</div><div class=\"card-desc\">핵심 컨텐츠를 중심으로 많은 주변 컨텐츠들이 파생된다. 좋은 핵심 컨텐츠는 강력한 확정성을 가진다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">Ex : 던전앤파이터</div><div class=\"card-desc\">: ‘재미있는 온라인 벨트스크롤 액션’이라는 좋은 핵심 컨텐츠가 있어 10년 이상 주변 컨텐츠를 보강하며 수명을 이어갔습니다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">Ex : 게임빌 프로야구</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">핵심</div><div class=\"card-desc\">: 나만의 선수 육성(컨텐츠 x) → 선수 고유 스킬 장착 및 레벨 업그레이드</div></div>\n<ul class=\"slide-points\"><li>훈련, 경기 참가 스케줄 진행</li><li>주변 인물들과의 에피소드 및 연애</li></ul>\n<div class=\"slide-text\"># <strong>P20) 초보 기획자의 흔한 함정: 잘못된 개선 방향</strong></div>\n<div class=\"slide-text\">게임을 더욱 재밌게 만들고자 할 때, 신입 기획자들이 흔히 저지르는 실수는 핵심적인 재미 요소를 깊게 고민하기보다 단순히 새로운 요소를 덧붙이는 작업에 집중한다는 점이다. 이들은 다음과 같은 접근 방식으로 게임을 ‘개선’하려고 한다.</div>\n<div class=\"slide-text\">**🗡️<br>더 많은 적**</div>\n<div class=\"slide-text\">**🗺️<br>더 많은 지역과 던전**</div>\n<div class=\"slide-text\">**🧃<br>더 좋은 아이템**</div>\n<div class=\"slide-text\">**⚙️<br>다양한 모드 추가**</div>\n<div class=\"slide-text\">**📖<br>더 풍성한 스토리**</div>\n<div class=\"slide-quote\">이러한 접근은 게임의 본질적인 재미, 즉 ‘핵심 컨텐츠’를 강화하는 고민 없이, 주변 컨텐츠만을 무작정 덧붙여 게임을 복잡하게 만들 뿐이다. 진정한 개선은 핵심에서 시작된다.</div>",
    "hasAudio": true,
    "start": 559.0,
    "end": 568.0
  },
  {
    "id": "P21",
    "title": "기획 의도를 살려볼까?",
    "content": "<div class=\"slide-text\">왜 이 시스템을 만드는지, 그 목적이 명확해야 한다.</div>",
    "hasAudio": true,
    "start": 592.0,
    "end": 605.0
  },
  {
    "id": "P22",
    "title": "기획 의도",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">시스템 디자인</div><div class=\"card-desc\">게임의 구조를 설계하는 일이다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">기획 의도의 명확화</div><div class=\"card-desc\">시스템 기획의 목표이자 검증 항목이다.</div></div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\">기획 의도를 파악하는 훈련은 초보 게임 기획자에게 매우 중요하다. 왜 이 시스템이 필요한지, 무엇을 달성하려는지 명확히 알아야 좋은 기획이 나온다.</div></div>",
    "hasAudio": true,
    "start": 592.0,
    "end": 605.0
  },
  {
    "id": "P23",
    "title": "기획 의도가 불명확한 시스템 기획은",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">시간 낭비</div><div class=\"card-desc\">방향을 잃으면서 개발 시간과 리소스를 낭비한다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">의사결정 지연</div><div class=\"card-desc\">명확한 기준이 없어 중요한 의사 결정을 내리지 못하게 한다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">기술 부채 발생</div><div class=\"card-desc\">지저분한 구조, 하드 코딩, 수많은 주석 처리된 소스 코드 양산</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">리소스 낭비</div><div class=\"card-desc\">만들어 놓고 쓰이지 않는 그래픽 리소스와 폐기되는 기획서들이 쌓인다.</div></div>",
    "hasAudio": true,
    "start": 605.0,
    "end": 619.0
  },
  {
    "id": "P24",
    "title": "기획 의도의 설정",
    "content": "<div class=\"slide-text\">게임 내 주요 핵심 컨텐츠와 파생 컨텐츠의 기획 의도 설정을 통해 각 컨텐츠의 리소스 양을 배분한다.</div>\n<div class=\"slide-card\"><div class=\"card-heading\">작업기간</div><div class=\"card-desc\">: 각 컨텐츠에 필요한 개발시간</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">작업 인력</div><div class=\"card-desc\">: 투입될 팀원의 수와 역할</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">데이터량</div><div class=\"card-desc\">: 필요한 데이터의 규모</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">그래픽 리소스</div><div class=\"card-desc\">: 아트 작업의 양과 퀄리티</div></div>",
    "hasAudio": true,
    "start": 619.0,
    "end": 626.0
  },
  {
    "id": "P25",
    "title": "기획 의도의 정리",
    "content": "<div class=\"slide-text\">핵심 컨텐츠와 파생 컨텐츠, 기획 의도 정리를 통해 다음 요소들이 정리된다.</div>\n<div class=\"slide-card\"><div class=\"card-heading\">재미 포인트</div><div class=\"card-desc\">유저 흡인 구조</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">잔류 요소</div><div class=\"card-desc\">컨텐츠 소모 관리</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">결제 유도</div><div class=\"card-desc\">유료화 구조</div></div>\n<div class=\"slide-text\">하지만 방향성을 명확히 하기 위해 해당 요소들은 따로 떼어 정리하는 것이 좋다.</div>",
    "hasAudio": true,
    "start": 626.0,
    "end": 633.0
  },
  {
    "id": "P26",
    "title": "핵심 사이클",
    "content": "<div class=\"slide-text\">플레이어가 반복하는 게임의 심장박동</div>\n<div class=\"slide-text\">Ex) 롤 : 미니언 처치 → 아이템 구매 → 미니언 처치</div>",

    "end": 641.0

    "title": "핵심 사이클의 중요성",
    "content": "<div class=\"slide-def-card\"><div class=\"def-title\">유저가 가장 자주, 빈번하게, 게임의 극초반부터 하게 되는 반복적인 플레이</div><div class=\"def-desc\"></div></div>\n<div class=\"slide-text\">핵심 사이클은 게임의 핵심적인 재미와 몰입감에 결정적 영향을 미칩니다. 아무리 훌륭한 그래픽과 스토리가 있어도 핵심 사이클이 재미없다면 플레이어는 게임을 떠나게 된다.</div>\n<div class=\"slide-text\">처음부터 모든 컨텐츠를 제공하지 않고 서서히 제공하면, 적절한 학습과 핵심 사이클의 지루함을 막아준다!<br>= 컨텐츠 배치<br>*전략 게임의 경우 처음부터 과도한 학습이 이루어져 유저가 지칠 수 있다!</div>",

  {
    "id": "P29",
    "title": "좋은 핵심 사이클의 설계",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">본질적 재미</div><div class=\"card-desc\">플레이를 통한 보상, 성장 등을 떠나 그 자체로 재미와 놀이의 기본적인 요소를 만족시켜야 한다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">흐름 유지</div><div class=\"card-desc\">재미의 흐름을 끊는 요소를 체크해 해결하거나 제거해야 한다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">피드백* 시스템</div><div class=\"card-desc\">상황에 적합한 부정적, 긍정적 피드백이 유도되어야 한다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">자원 균형</div><div class=\"card-desc\">게임에 지속적인 영향을 미치는 자원의 생산과 소비를 고려해야 한다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">*피드백</div><div class=\"card-desc\">: 게임에서 일어나는 반응 [인과 관계의 ‘과’] → 매우매우 다양하다!</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">*스탑 모션</div><div class=\"card-desc\">: 타격감을 위한 피드백 중 하나로 화면을 잠깐 멈춰서 피드백을 제공한다.</div></div>",
    "hasAudio": true,
    "start": 656.0,
    "end": 669.0
  },
  {
    "id": "P30",
    "title": "Engine & Deadlock",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">Engine : 무한 동력 상황</div><div class=\"card-desc\">자원이 무한 증식하는 상황</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">Ex</div><div class=\"card-desc\">: 뱀이 알을 낳음 → 그 알을 먹고 뱀이 커짐 → 커진 뱀이 더 큰 알을 낳음 → 무한 반복 게임이 너무 쉬워지거나 밸런스가 무너진다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">Deadlock  : 순환 불가 상황</div><div class=\"card-desc\">자원 순환이 더 이상 일어나지 못하는 상황</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">Ex</div><div class=\"card-desc\">: 워크래프트3의 언데드는 금을 캐려면 금광에 건물을 지어야 한다. 언데드는 자신의 건물을 팔아치울 수 있다. 실수로 초반에 금광을 팔아치우면? 일꾼이 건재해도 금이 없어 금광에 건물을 짓지 못하고 플레이가 더이상 진행되지 못한다.</div></div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\">초보 기획자의 경우 의외로 초반 Deadlock 식 설계를 하는 경우가 많다. “사람이 머리가 있으면 설마 이렇게 플레이하곘어?” 라는 안일한 접근은 위험하다.</div></div>",
    "hasAudio": true,
    "start": 669.0,
    "end": 711.0
  },
  {
    "id": "P31",
    "title": "세계관 구성",
    "content": "<div class=\"slide-text\">세계관이란 무엇이고 꼭 필요한 걸까?</div>",
    "hasAudio": true,
    "start": 711.0,
    "end": 721.0
  },
  {
    "id": "P32",
    "title": "세계관이란",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">기본 뼈대</div><div class=\"card-desc\">게임의 기본 뼈대 또는 중심이 되는 요소</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">시공간 설정</div><div class=\"card-desc\">게임 내 시간, 공간, 주요 인과 관계에 대한 설정</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">기준점</div><div class=\"card-desc\">설정한 세계관을 기준으로 게임 내 요소들이 결정됨</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">시나리오 기반</div><div class=\"card-desc\">세계관을 기반으로 시나리오가 쓰여져야 함</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">세 가지 핵심 질문</div><div class=\"card-desc\">세계관을 설정할 때 다음의 세 가지 질문을 항상 생각해야 한다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">왜?</div><div class=\"card-desc\">: 왜그렇게 되었는가?  / <strong>어떻게?</strong> : 어떻게 작동하는가?  / <strong>결과는?</strong> : 그것이 세게에 어떤 영향을 미치는가?</div></div>",
    "hasAudio": true,
    "start": 721.0,
    "end": 732.0
  },
  {
    "id": "P33",
    "title": "세계관을 설정하는 시점",
    "content": "<div class=\"slide-text\">플랫폼, 장르에 따라 세계관을 설정하는 시점이 다르다.</div>\n<div class=\"slide-card\"><div class=\"card-heading\">기본 원칙</div><div class=\"card-desc\">게임의 장르 및 특징(그래픽, 컨셉, 시점 등), 핵심 시스템과 컨텐츠에 대한 기획이 선행 혹은 병행되어야 한다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">예외 사례</div><div class=\"card-desc\">: 콘솔 또는 싱글 게임의 경우 세계관과 시나리오를 선행하기도 한다. → 이야기가 중요한 경우</div></div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\">핵심 시스템과 핵심적인 세부 시스템은 세계관에 맞춰 설계되어야 한다.</div></div>",
    "hasAudio": true,
    "start": 727.0,
    "end": 736.0
  },
  {
    "id": "P34",
    "title": "해당 세계의 핵심 규칙",
    "content": "<ul class=\"slide-points\"><li>해당 세계의 시공간적 배경은?</li><li>주요 갈등 요소는?</li><li>게임 내 등장하는 모든 캐릭터가 공유하는 가치관은?</li><li>중요하게 생각되는 가치는?</li><li>세계의 각 분야가 작동하는  원리는?</li><li>해당 세계과 실제 세계와의 공통점과 차이점은?</li><li>그 세계는 어떠한 과거를 거쳐 현재의 모습을 갖추게 되었는가?</li></ul>",
    "hasAudio": true,
    "start": 732.0,
    "end": 745.0
  },
  {
    "id": "P35",
    "title": "규칙 설정 예시1: 무협세계의 무공",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">실제 세계</div><div class=\"card-desc\">나이를 먹을수록 순발력, 회복력, 맷집 등 신체 능력이 쇠퇴하기 때문에 실전에 불리하다.</div></div>\n<div class=\"slide-text\">노인 무술가는 젊은이보다 불리할 수밖에 없다.</div>\n<div class=\"slide-card\"><div class=\"card-heading\">무협 세계</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">핵심 규칙</div><div class=\"card-desc\">: 수련을 할수록 오의를 깨닫음 노인이라도 오랜 기간 무공을 수련한 사람은 젊은이보다 훨씬 강력한 능력을 발휘한다.</div></div>\n<div class=\"slide-text\">종종 절대 고수는 나이를 가늠할 수 없는 노인이 그 역할을 맡는다.</div>",
    "hasAudio": true,
    "start": 738.0,
    "end": 744.0
  },
  {
    "id": "P36",
    "title": "규칙 설정 예시2: 아이템에 보석 박기",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">실제 세계</div><div class=\"card-desc\">대부분 칼에 보석을 박는 건 의전 또는 제사용으로 사용하는 칼이다.</div></div>\n<div class=\"slide-text\">실전용 무기에 보석을 박으면 무게 중심이 흐트러지고 내구도가 약해져 칼 본연의 기능이 떨어진다.</div>\n<div class=\"slide-card\"><div class=\"card-heading\">게임 세계</div><div class=\"card-desc\">핵심 규칙: 연금술사들이 보석에 능력을 부여 존재가 밝혀지지 않은 고대의 연금술사들이 보석에 특별한 능력을 부여하였다.</div></div>\n<div class=\"slide-text\">무기나 갑옷 등에 장착하면 해당 보석의 능력이 전이되어 착용자의 능력을 강화시킨다.</div>",
    "hasAudio": true,
    "start": 745.0,
    "end": 753.0
  },
  {
    "id": "P37",
    "title": "세계관 설정 항목",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">시대</div><div class=\"card-desc\">: 언제의 이야기인가</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">세계의 법칙</div><div class=\"card-desc\">: 어떤 규칙으로 작동하는가</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">장소</div><div class=\"card-desc\">: 어디서 벌어지는가</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">언어</div><div class=\"card-desc\">: 무엇으로 소통하는가</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">세력 구성</div><div class=\"card-desc\">: 누가 힘을 가지고 있는가</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">이동/통신 수단</div><div class=\"card-desc\">: 어떻게 연결되는가</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">사회 시스템</div><div class=\"card-desc\">: 어떻게 조직되는가</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">사회적 갈등</div><div class=\"card-desc\">: 무엇이 충돌하는가</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">가족 제도</div><div class=\"card-desc\">: 어떻게 연결되는가</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">물리적 갈등</div><div class=\"card-desc\">: 어떻게 싸우는가</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">사람들의 생활</div><div class=\"card-desc\">: 어떻게 살아가는가</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">주요 사건</div><div class=\"card-desc\">: 무슨 일이 일어났는가</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">사회 통념</div><div class=\"card-desc\">: 무엇이 옳은가</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">역사</div><div class=\"card-desc\">: 과거에 무슨 일이 있었는가</div></div>\n<div class=\"slide-text\">*모두 설정할 필요는 없지만, 꼼꼼할수록 좋다!</div>",
    "hasAudio": true,
    "start": 753.0,
    "end": 778.0
  },
  {
    "id": "P38",
    "title": "시대",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">핵심 질문</div></div>\n<ul class=\"slide-points\"><li>어느 시대인가?</li><li>현실 세계의 어느 시대와 가장 유사한가?</li><li>이 시대를 특징적으로 표현하는 말은?</li></ul>\n<div class=\"slide-card\"><div class=\"card-heading\">Ex</div><div class=\"card-desc\">: 좀비 아포칼립스, 증기기관 로봇이 존재하는 스팀펑크, 중국 원-명 교체기 무협 세계</div></div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\">다른 항목들은 설정한 시대와 부합해야 한다. (판타지 장르의 경우 예외가 될 수도 있음)</div></div>",
    "hasAudio": true,
    "start": 758.0,
    "end": 763.0
  },
  {
    "id": "P39",
    "title": "장소",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">핵심 질문</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">주 무대는 어디인가?</div><div class=\"card-desc\">다수의 장수가 존재해도 무방. 그러나 그 장소가 있어야 하는 목적성, 당위성이 명확해야 한다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">국가, 지역은 어떻게 구성되어있는가?</div><div class=\"card-desc\">지리적 구조와 각 지역의 관게를 설정한다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">이 장소의 특징을 나타내는 말은?</div><div class=\"card-desc\">각 장소의 분위기와 특성을 한 문장으로 표현한다.</div></div>\n<div class=\"slide-text\">예시 1 : 치안이 불안정한 암울한 대도시<br>예시 2 : 거대한 나무 위에 구축된 밝고 화사한 분위기의 요정 마을</div>\n<div class=\"slide-text\">시나리오를 통해 각 장소의 존재에 대한 목적성과 당위성을 부여할 수 있다.</div>",
    "hasAudio": true,
    "start": 758.0,
    "end": 763.0
  },
  {
    "id": "P40",
    "title": "각종 세력 구성",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">핵심 질문</div></div>\n<ul class=\"slide-points\"><li>나라, 세력 또는 그것에 대응하는 개념이 있는가?</li><li>해당 세계에 영향을 미치는 종교 또는 사상이 있는가?</li><li>종교 또는 사상의 영향력 및 종류는?</li><li>민족 및 종족 구성은 어떻게 되는가?</li><li>민족(종족) 간 역학 관계 및 서로간의 관계는?</li></ul>\n<div class=\"slide-card\"><div class=\"card-heading\">트레이드오프 (상충관계)</div><div class=\"card-desc\">장점 : 세력이 많아지면 세계관이 단단해지고 다양한 시나리오가 나올 수 있다. 단점 : 내용이 분산되기 때문에 유저에게 전달하기 어려워진다.</div></div>",
    "hasAudio": true,
    "start": 758.0,
    "end": 777.0
  },
  {
    "id": "P41",
    "title": "사회 시스템",
    "content": "<div class=\"slide-card\"><div class=\"card-heading\">정치 체제</div><div class=\"card-desc\">질문 : 해당 세계의 정치 체제와 특징적인 정치 상황은?</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">Ex</div><div class=\"card-desc\">: 황제의 아들들이 각 제후국의 왕이며, 황제의 급격한 병세 악화로 서로가 황권을 노리는 일촉즉발 상태</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">경제 체제</div><div class=\"card-desc\">질문 : 해당 세계의 경제 체제와 특정적인 경제 상황은?</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">Ex</div><div class=\"card-desc\">: 배급제, 무역이 활발함, 돈이면 모든 것이 해결됨 추가 질문 : 화폐 혹은 그에 해당하는 중요한 물물교환 수단 및 가치가 되는 자원은?</div></div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\">정치적인 상황이 종료될 경우 세계관과 시나리오의 변화가 일어난다.<br>→ 갈등 요소가 사라짐과 동시에 새로운 갈등 요소가 발생</div></div>",
    "hasAudio": true,
    "start": 769.0,
    "end": 785.0
  },
  {
    "id": "P42",
    "title": "가족 제도",
    "content": "<div class=\"slide-text\">사회 시스템에 파생되는 항목으로 사회 시스템에 영향을 받는다.</div>\n<div class=\"slide-card\"><div class=\"card-heading\">핵심 질문</div><div class=\"card-desc\">가족 제도는 어떤 것인가? : 대가족제, 핵가족제, 공동체 중심 등 혼인 제도는 존재하는가? 존재한다면 그 형태는? : 일부일처제, 일부다처제, 정략 결혼 등 연령에 따른 가족 내 대우 및 생활상은? : 영유아, 청소년, 성년, 중년, 노년 등의 역할과 권리 남녀의 가족 내 대우 및 생활상은? : 성별에 따른 역할 분담과 권리, 의무</div></div>",
    "hasAudio": true,
    "start": 769.0,
    "end": 785.0
  },
  {
    "id": "P43",
    "title": "사람들의 생활",
    "content": "<div class=\"slide-text\">시대, 장소, 정치적, 사회적 요소에 영향을 받으며, 장소와 지역에 따라 다양하게 표현된다.</div>\n<div class=\"slide-card\"><div class=\"card-heading\">핵심 질문</div><div class=\"card-desc\">경제 상태 : 부유한가? 가난한가? 빈부 격차는 심한가? 의식주 : 무엇을 입고, 먹고, 어디서 사는가? 직업 : 사람들은 어떤 직업을 가지고 있는가?</div></div>",
    "hasAudio": true,
    "start": 769.0,
    "end": 785.0
  },
  {
    "id": "P44",
    "title": "사회 통념",

const TRANSCRIPT = [{"start": 0.0, "end": 4.32, "text": "여러분 그 완벽하고 아름다운 건축 도면 보신 적 있으시죠?"}, {"start": 4.32, "end": 7.72, "text": "종이 위에서는 모든 선이 기가 막히게 딱딱 맞아 떨어집니다"}, {"start": 7.72, "end": 10.0, "text": "네 보면 진짜 예술이 따로 없죠"}, {"start": 10.0, "end": 13.48, "text": "그쵸, 야 이대로 지으면 진짜 대박이겠다 싶잖아요"}, {"start": 13.48, "end": 18.44, "text": "근데 막상 그 도면대로 시멘트를 붓고 건물을 쫙 올렸더니"}, {"start": 18.44, "end": 20.96, "text": "방문이 벽에 걸려서 안 열리는 거예요"}, {"start": 20.96, "end": 24.36, "text": "아이고 2층으로 가는 계단이 허공에서 뚝 끊겨 있고"}, {"start": 24.36, "end": 25.96, "text": "그러면 정말 끔찍하네요"}, {"start": 25.96, "end": 28.12, "text": "상상만 해도 진짜 아찔한데"}, {"start": 28.12, "end": 31.32, "text": "현실의 건축에서는 뭐 상상하기 힘든 일이지만요"}, {"start": 31.32, "end": 35.64, "text": "놀랍게도 여러분이 즐겨 하시는 수많은 게임의 개발 과정에서는"}, {"start": 35.64, "end": 38.44, "text": "이런 대참사가 아주 빈번하게 일어난다고 합니다"}, {"start": 38.44, "end": 40.92, "text": "맞습니다 기초 설계가 부실하면"}, {"start": 40.92, "end": 44.2, "text": "나중에 아무리 화려한 그래픽으로 페인트 칠을 하고"}, {"start": 44.2, "end": 46.92, "text": "유명한 성우를 써서 장식을 막 덧붙여도"}, {"start": 46.92, "end": 49.0, "text": "결국 게임 자체가 무너지고 마니까요"}, {"start": 49.0, "end": 50.64, "text": "바로 그 지점입니다"}, {"start": 50.64, "end": 52.52, "text": "항상 새로운 배움을 갈구하며"}, {"start": 52.52, "end": 55.6, "text": "오늘의 깊이 있는 탐구에 동참해주신 청취자 여러분"}, {"start": 55.6, "end": 57.2, "text": "진심으로 환영합니다"}, {"start": 57.24, "end": 59.96, "text": "오늘 우리가 파헤칠 자료가 정말 흥미로워요"}, {"start": 59.96, "end": 65.36, "text": "막연한 상상력이 어떻게 치밀하고 단단한 게임이라는 건축물로 완성되는지"}, {"start": 65.36, "end": 67.68, "text": "보여주는 아주 중요한 문건이거든요"}, {"start": 67.68, "end": 72.2, "text": "네 바로 게임 기획을 처음 배우는 학생들을 위한 기초 강의 자료죠"}, {"start": 72.2, "end": 75.92, "text": "맞아요 그리고 오늘 저희 미션이 아주 명확하거든요"}, {"start": 75.92, "end": 79.52000000000001, "text": "이 자료는 게임 기획을 처음 배우는 학생을 위한 강의입니다"}, {"start": 79.52000000000001, "end": 82.2, "text": "그래서 저희 커버리즈 원칙이 하나 있어요"}, {"start": 82.2, "end": 86.0, "text": "강의 자료의 모든 개념 그러니까 P(페이지)로 마킹된 페이지와"}, {"start": 86.0, "end": 89.88, "text": "그 안에 항목을 정말 단 하나도 빠짐없이 다뤄야 한다는 겁니다"}, {"start": 89.88, "end": 92.96, "text": "와 1페이지부터 52페이지까지 전부 다요?"}, {"start": 92.96, "end": 95.32, "text": "네 전부 다 해부해보는 겁니다"}, {"start": 95.32, "end": 98.16, "text": "단순히 이런 게 있다 하고 넘어가는 게 아니고요"}, {"start": 98.16, "end": 102.52, "text": "이 기획의 뼈대들이 청취자 여러분이 게임을 할 때 느끼는 그 찌릿한 재미와"}, {"start": 102.52, "end": 105.96000000000001, "text": "어떻게 연결되는지 저희가 친근하게 안내해드리겠습니다"}, {"start": 105.96000000000001, "end": 107.2, "text": "좋습니다"}, {"start": 107.2, "end": 112.0, "text": "저는 이 기획의 각 단계들이 실제 게임의 성공이나 유저 경험에 대체"}, {"start": 112.0, "end": 114.56, "text": "왜 그렇게 결정적인 영향을 미치는지"}, {"start": 114.56, "end": 117.84, "text": "그 인과 관계를 아주 날카롭게 짚어드리겠습니다"}, {"start": 117.84, "end": 120.4, "text": "자 그럼 1페이지부터 시작해보죠"}, {"start": 120.4, "end": 124.12, "text": "게임 개발의 가장 첫 단추인 컨셉 기획입니다"}, {"start": 124.12, "end": 126.48, "text": "강의 자료 P1과 P2를 보면"}, {"start": 126.48, "end": 130.84, "text": "컨셉 기획은 전체 콘텐츠의 스케치를 하는 단계라고 정의하고 있어요"}, {"start": 130.84, "end": 134.12, "text": "네 개발 수순으로 보면 먼저 시장조사를 쫙 하고"}, {"start": 134.12, "end": 136.0, "text": "그 다음 컨셉을 딱 결정하고"}, {"start": 136.0, "end": 138.24, "text": "그걸 바탕으로 프로토타입을 만드는 거죠"}, {"start": 138.24, "end": 141.76, "text": "개발자에게는 길을 잃지 않게 해주는 나침반이고"}, {"start": 141.76, "end": 146.6, "text": "유저에게는 이 게임을 살지 말지 결정하게 만드는 첫인상이라는 거네요"}, {"start": 146.6, "end": 148.39999999999998, "text": "근데 제가 좀 궁금한 게"}, {"start": 148.39999999999998, "end": 153.04, "text": "이 컨셉이라는 게 흔히 말하는 기획 의도랑 그냥 똑같은 거 아닌가요?"}, {"start": 153.04, "end": 155.16, "text": "어 아주 날카로운 질문인데요"}, {"start": 155.16, "end": 158.48, "text": "초보 기획자들이 제일 많이 헷갈리는 부분입니다"}, {"start": 158.48, "end": 163.51999999999998, "text": "기획 의도가 우리가 이 게임을 왜 만드는가 하는 목적에 가깝다면요"}, {"start": 163.51999999999998, "end": 166.39999999999998, "text": "컨셉은 그 목적을 투자자나 유저가"}, {"start": 166.39999999999998, "end": 169.64, "text": "한눈에 딱 알아볼 수 있게 시각화하는 과정이거든요"}, {"start": 169.64, "end": 173.48, "text": "P3에서 P4에 나오는 예시를 보면 확 와닿으실 겁니다"}, {"start": 173.48, "end": 177.35999999999999, "text": "아 그 죽은 컨셉이랑 살아있는 컨셉 얘기요?"}, {"start": 177.35999999999999, "end": 180.0, "text": "그 은행 예시가 참 재밌더라고요"}, {"start": 180.0, "end": 181.92, "text": "예를 들어 어떤 금융회사가"}, {"start": 181.92, "end": 186.27999999999997, "text": "우리는 최첨단이고 혁신적이며 신뢰를 바탕으로 성장합니다"}, {"start": 186.27999999999997, "end": 187.95999999999998, "text": "이렇게 기획서를 썼다고 해보죠"}, {"start": 187.95999999999998, "end": 189.39999999999998, "text": "멋진 말은 다 들어갔네요"}, {"start": 189.39999999999998, "end": 191.2, "text": "네 근데 청취자 여러분"}, {"start": 191.2, "end": 194.0, "text": "솔직히 머릿속에 그려지는 게 아무것도 없잖아요"}, {"start": 194.0, "end": 195.83999999999997, "text": "그냥 흔한 광고 멘트 같고요"}, {"start": 195.83999999999997, "end": 199.07999999999998, "text": "자료에서는 이걸 완벽하게 죽은 컨셉이라고 부르더군요"}, {"start": 199.08, "end": 200.16000000000003, "text": "그렇죠"}, {"start": 200.16000000000003, "end": 202.16000000000003, "text": "반면에 살아있는 컨셉의 예시로"}, {"start": 202.16000000000003, "end": 204.52, "text": "일본의 쓰루가 은행 사례가 나옵니다"}, {"start": 204.52, "end": 206.8, "text": "우리는 개인 금융에 특화되어 있고"}, {"start": 206.8, "end": 209.52, "text": "정맥인식이라는 확실한 보안을 쓰며"}, {"start": 209.52, "end": 212.24, "text": "고객의 생활을 관리한다 이렇게 내세우거든요"}, {"start": 212.24, "end": 214.24, "text": "오 아주 구체적이네요"}, {"start": 214.24, "end": 218.64000000000001, "text": "네 수많은 경쟁작 속에서 유저의 선택을 받는 차별화의 핵심"}, {"start": 218.64000000000001, "end": 221.84, "text": "이 바로 이런 구체성 좋은 컨셉에서 나오는 거죠"}, {"start": 221.84, "end": 223.52, "text": "P4페이지의 핵심입니다"}, {"start": 223.52, "end": 226.52, "text": "근데요 저는 P4페이지를 읽으면서"}, {"start": 226.52, "end": 228.84, "text": "약간 반항심이 들었어요"}, {"start": 228.88, "end": 232.4, "text": "훌륭한 컨셉은 거대한 필터 역할을 해야 한다면서"}, {"start": 232.4, "end": 236.4, "text": "모든 걸 한 문장이나 아주 좁은 틀로 묶어버리라고 하잖아요"}, {"start": 236.4, "end": 238.44, "text": "네 필터링이 중요하다고 하죠"}, {"start": 238.44, "end": 242.64000000000001, "text": "개발 초기부터 이렇게 스스로를 작은 상자 안에 가둬 버리면"}, {"start": 242.64000000000001, "end": 245.56, "text": "개발자들의 창의성을 너무 제한하는 거 아닐까요?"}, {"start": 245.56, "end": 248.76, "text": "막 이것도 재밌겠고 저것도 재밌겠는데 하면서"}, {"start": 248.76, "end": 250.88, "text": "자유롭게 아이디어를 낼 수도 있잖아요"}, {"start": 250.88, "end": 253.32, "text": "어 충분히 그렇게 생각하실 수 있습니다"}, {"start": 253.32, "end": 257.48, "text": "하지만 실제 개발 현장에서는 그 자유로움이 오히려 끔찍한 독이 됩니다"}, {"start": 257.48, "end": 262.32, "text": "컨셉이 필터 역할을 해야 하는 3가지 진짜 치명적인 이유가 있어요"}, {"start": 262.32, "end": 263.48, "text": "오 3가지나요?"}, {"start": 263.48, "end": 266.36, "text": "네 첫째는 일관성 유지입니다"}, {"start": 266.36, "end": 269.20000000000005, "text": "공포게임을 만들고 있는데 갑자기 누군가"}, {"start": 269.20000000000005, "end": 273.32, "text": "요즘 유행하는 코믹 댄스 이모티콘을 넣자고 제안했다고 쳐보죠"}, {"start": 273.32, "end": 276.6, "text": "으아 공포게임에요? 분위기 다 깨지겠네요"}, {"start": 276.6, "end": 279.16, "text": "그렇죠 근데 컨셉이라는 필터가 없으면"}, {"start": 279.16, "end": 282.72, "text": "이 아이디어를 쳐낼 명확한 기준이 없는 겁니다"}, {"start": 282.72, "end": 285.88, "text": "둘째는 효율적인 커뮤니케이션이에요"}, {"start": 285.88, "end": 288.71999999999997, "text": "우리 게임은 차갑고 외로운 우주가 배경이다"}, {"start": 288.71999999999997, "end": 292.24, "text": "이렇게 딱 정의하면 그래픽 팀은 푸른색 톤을 쓰고"}, {"start": 292.24, "end": 295.12, "text": "사운드 팀은 적막한 소리를 만들겠죠"}, {"start": 295.12, "end": 298.08, "text": "수백 명의 팀원이 한 방향을 보게 만드는 겁니다"}, {"start": 298.08, "end": 300.68, "text": "아 마지막 셋째는 마케팅 효율이겠네요"}, {"start": 300.68, "end": 301.76, "text": "맞습니다"}, {"start": 301.76, "end": 304.56, "text": "유저에게 단 한 문장으로 매력을 꽂아 넣어야"}, {"start": 304.56, "end": 307.15999999999997, "text": "마케팅 비용과 시간을 아낄 수 있으니까요"}, {"start": 307.15999999999997, "end": 311.28, "text": "듣고 보니 팀의 방향이 산으로 가는 걸 막아주는 튼튼한 방파제네요"}, {"start": 311.28, "end": 315.15999999999997, "text": "그럼 그 마법의 한 문장은 도대체 어떻게 만드냐"}, {"start": 315.16, "end": 319.04, "text": "P6랑 P7에 아주 명확한 공식이 나오더라고요"}, {"start": 319.04, "end": 320.72, "text": "네 컨셉의 3대 요소죠"}, {"start": 320.72, "end": 324.12, "text": "맞아요 유저가 느낄 감정인 경험"}, {"start": 324.12, "end": 326.04, "text": "게임의 배경인 테마"}, {"start": 326.04, "end": 329.24, "text": "그리고 핵심 규칙인 메커니즘입니다"}, {"start": 329.24, "end": 333.24, "text": "이건 결합해서 테마에서 경험과 메커니즘을 더해"}, {"start": 333.24, "end": 335.40000000000003, "text": "장르가 나뉜다는 공식이에요"}, {"start": 335.40000000000003, "end": 337.44000000000005, "text": "구체적인 예를 들어볼까요?"}, {"start": 337.44000000000005, "end": 340.6, "text": "좀비가 창궐한 포스트 아포칼립스 세계관에서"}, {"start": 340.6, "end": 341.88, "text": "이게 테마죠?"}, {"start": 341.88, "end": 344.36, "text": "주변 자원을 수집해 기지를 건설하고"}, {"start": 344.36, "end": 348.04, "text": "끝까지 살아남는 이게 경험과 메커니즘입니다"}, {"start": 348.04, "end": 350.96000000000004, "text": "이걸 합치면 3인칭 생존 액션 게임이라는"}, {"start": 350.96000000000004, "end": 352.8, "text": "장르가 빡 떨어지는 겁니다"}, {"start": 352.8, "end": 357.16, "text": "애매한 형용사 없이 진짜 뼈대가 딱 완성되네요"}, {"start": 357.16, "end": 361.44, "text": "그럼 P8 페이지로 넘어가서 이 뼈대가 세워지면"}, {"start": 361.44, "end": 364.56, "text": "세부 컨텐츠를 기획할 때 일종의 라벨링을"}, {"start": 364.56, "end": 366.0, "text": "할 수 있게 된다고 하네요"}, {"start": 366.0, "end": 369.72, "text": "네 시스템이나 컨텐츠 기획의 시작점이 되는 거죠"}, {"start": 369.72, "end": 372.76, "text": "몬스터를 잡아서 그 껍질로 장비를 만드는"}, {"start": 372.76, "end": 375.28, "text": "몬스터 헌터식 컨텐츠를 넣을지"}, {"start": 375.28, "end": 378.56, "text": "아니면 돈을 쏟아부어 아이템 희소성을 높이는"}, {"start": 378.56, "end": 381.28, "text": "리니지라이크식 하드코어 시스템을 넣을지"}, {"start": 381.28, "end": 383.12, "text": "라벨링을 딱딱 붙이는 거군요"}, {"start": 383.12, "end": 384.12, "text": "맞아요"}, {"start": 384.12, "end": 387.44, "text": "그리고 P9 페이지를 보면 여기서 반드시 결정해야 할"}, {"start": 387.44, "end": 391.15999999999997, "text": "필수 옵션과 미뤄두어도 되는 선택 옵션을 나눕니다"}, {"start": 391.15999999999997, "end": 392.64, "text": "어떻게 나누나요?"}, {"start": 392.64, "end": 397.08, "text": "중심 테마, 파생 컨텐츠, 기획 의도, 핵심 사이클은"}, {"start": 397.08, "end": 400.03999999999996, "text": "무조건 먼저 확정해야 하는 필수 옵션입니다"}, {"start": 400.04, "end": 404.72, "text": "반면에 세세한 재미 포인트나 잔류 유도 방식, 결제 요소는"}, {"start": 404.72, "end": 406.88, "text": "선택 옵션으로 잠시 빼두는 거죠"}, {"start": 406.88, "end": 410.20000000000005, "text": "아하 P10 페이지 내용이 그거군요"}, {"start": 410.20000000000005, "end": 412.6, "text": "필수 옵션이 단단하게 잡혀야"}, {"start": 412.6, "end": 415.76000000000005, "text": "비로소 세계관, 시스템, 스토리"}, {"start": 415.76000000000005, "end": 418.48, "text": "대략적인 개발 스펙이 결정된다는 거네요"}, {"start": 418.48, "end": 420.16, "text": "네 아주 정확합니다"}, {"start": 420.16, "end": 424.92, "text": "근데 여기서 P11 페이지부터 제가 제일 헷갈렸던 게 나옵니다"}, {"start": 424.92, "end": 428.20000000000005, "text": "바로 컨셉과 중심 테마의 차이였어요"}, {"start": 428.24, "end": 430.28, "text": "둘 다 비슷한 말 아닌가 했는데"}, {"start": 430.28, "end": 433.12, "text": "집 짓기 비유를 보고 무릎을 탁 쳤습니다"}, {"start": 433.12, "end": 434.59999999999997, "text": "어떻게 이해하셨나요?"}, {"start": 434.59999999999997, "end": 437.0, "text": "(컨셉이) 그냥 어떤 물리적인 팩트라면요"}, {"start": 437.0, "end": 441.76, "text": "중심 테마는 이 집은 우리 가족의 따뜻한 유대감을 위해 지었다"}, {"start": 441.76, "end": 444.12, "text": "라는 철학이나 감정인 거죠"}, {"start": 444.12, "end": 446.2, "text": "와 완벽한 이해네요"}, {"start": 446.2, "end": 450.4, "text": "P12에서 아주 매력적으로 다루는 부분이 바로 그겁니다"}, {"start": 450.4, "end": 453.76, "text": "같은 좀비 생존 컨셉이라도 중심 테마에 따라"}, {"start": 453.76, "end": 455.68, "text": "전혀 다른 게임이 되거든요"}, {"start": 455.68, "end": 458.96, "text": "만약 테마가 처절한 이기심이라면 어떨까요?"}, {"start": 458.96, "end": 461.2, "text": "그럼 자원은 엄청 안 나오고"}, {"start": 461.2, "end": 464.76, "text": "남의 뒤통수를 쳐야만 내가 살 수 있게 디자인 되겠죠"}, {"start": 464.76, "end": 466.36, "text": "완전 불신의 게임이네요"}, {"start": 466.36, "end": 470.2, "text": "그렇죠 반대로 테마가 절망 속에 인간애라면"}, {"start": 470.2, "end": 472.88, "text": "혼자서는 절대 못 깨는 보스를 두고"}, {"start": 472.88, "end": 476.68, "text": "남을 치려하면 엄청난 보상을 주는 시스템이 될 겁니다"}, {"start": 476.68, "end": 480.96000000000004, "text": "그래서 P13 페이지에서 기획의 일관성과 차별화를 위해"}, {"start": 480.96000000000004, "end": 483.44, "text": "이 둘을 반드시 나누라고 강조하는 겁니다"}, {"start": 483.44, "end": 486.84, "text": "P14에 명작게임 예시들이 나오잖아요"}, {"start": 486.84, "end": 491.36, "text": "모던 워페어는 단순 슈팅이 아니라 전쟁의 딜레마를"}, {"start": 491.36, "end": 494.28, "text": "바이오 해저드는 거대 기업의 탐욕을"}, {"start": 494.28, "end": 497.76, "text": "문명 온라인은 유저의 선택을 테마로 잡았죠"}, {"start": 497.76, "end": 501.28, "text": "네 그리고 P15로 가면 이 중심 테마가"}, {"start": 501.28, "end": 505.08, "text": "아주 사소한 컨텐츠로도 일관되게 파생되어야 한다고 합니다"}, {"start": 505.08, "end": 508.28, "text": "커피가게 테마라면 단골 손님 시스템이 있어야 하고"}, {"start": 508.28, "end": 511.44, "text": "전장의 긴장감이 테마라면 캐릭터가 다쳤을 때"}, {"start": 511.44, "end": 514.16, "text": "화면에 피와 땀이 묻어나는 효과가 들어가야죠"}, {"start": 514.16, "end": 516.16, "text": "이야 진짜 디테일하네요"}, {"start": 516.16, "end": 520.04, "text": "자 이제 P16부터 P30까지 두 번째 섹션"}, {"start": 520.04, "end": 522.0, "text": "게임의 심장박동이라고 할 수 있는"}, {"start": 522.0, "end": 524.88, "text": "핵심 컨텐츠와 기획 의도로 넘어가 보겠습니다"}, {"start": 524.88, "end": 526.48, "text": "네 아주 중요한 파트죠"}, {"start": 526.48, "end": 528.44, "text": "유저를 사로잡는 강력한 무기니까요"}, {"start": 528.44, "end": 532.0, "text": "맞아요 P16과 P17을 보면 중심 테마를"}, {"start": 532.0, "end": 535.56, "text": "유저가 가장 직접적으로 즐길 수 있는 놀거리려고 하더라고요"}, {"start": 535.56, "end": 539.12, "text": "이걸 가장 잘 보여주는 게 P8에 나오는 리니지의 공성전입니다"}, {"start": 539.12, "end": 540.8, "text": "아 공성전 유명하죠"}, {"start": 540.8, "end": 543.76, "text": "성을 차지하는 대규모 전투가 핵심이니까"}, {"start": 543.76, "end": 546.7199999999999, "text": "유저들은 혈맹을 만들어 결속합니다"}, {"start": 546.7199999999999, "end": 551.16, "text": "하드코어 유저가 주도권을 쥐고 세금 때문에 경제가 폭발하죠"}, {"start": 551.16, "end": 555.4799999999999, "text": "하지만 그 이면에는 작업장 같은 부작용도 따라옵니다"}, {"start": 555.4799999999999, "end": 559.7199999999999, "text": "핵심 컨텐츠 하나가 게임의 정체성을 전부 결정 지어버리는 거예요"}, {"start": 559.7199999999999, "end": 563.3199999999999, "text": "P19에 나오는 던파의 벨트 스크롤 액션이나"}, {"start": 563.3199999999999, "end": 565.92, "text": "게임빌 프로야구의 나만의 선수 육성도"}, {"start": 565.92, "end": 568.88, "text": "다 핵심을 통해 주변 시스템이 확장 되는 거네요"}, {"start": 568.92, "end": 572.16, "text": "그렇죠 그런데 여기서 P20 페이지를 보면"}, {"start": 572.16, "end": 575.24, "text": "초보 기획자들의 끔찍한 함정이 나옵니다"}, {"start": 575.24, "end": 577.4, "text": "본질적 재미를 고치지 않고"}, {"start": 577.4, "end": 581.8, "text": "적, 던전, 아이템, 스토리만 무작정 덧붙이려고 한다는 거죠"}, {"start": 581.8, "end": 583.76, "text": "이거 약간 요리에 비유하자면"}, {"start": 583.76, "end": 585.24, "text": "국물이 진짜 맛이 없는데"}, {"start": 585.24, "end": 588.36, "text": "거기다 조미료랑 고명만 잔뜩 얻는 격 아닌가요?"}, {"start": 588.36, "end": 590.6, "text": "아 비유 너무 좋습니다"}, {"start": 590.6, "end": 592.68, "text": "도대체 무슨 의미가 있겠어요 그게?"}, {"start": 592.68, "end": 595.08, "text": "그래서 P21부터 P25까지"}, {"start": 595.08, "end": 598.44, "text": "기획 의도가 명확해야 한다고 강조하는 거군요"}, {"start": 598.44, "end": 601.8800000000001, "text": "목적이 불명확하면 시간 낭비, 의사결정 지연"}, {"start": 601.8800000000001, "end": 604.24, "text": "그리고 기술부채가 발생한다구요"}, {"start": 604.24, "end": 605.96, "text": "잠깐만요 기술부채요?"}, {"start": 605.96, "end": 608.2800000000001, "text": "네 P23에 나오죠"}, {"start": 608.2800000000001, "end": 610.48, "text": "기획이 이랬다 저랬다 바뀌니까"}, {"start": 610.48, "end": 612.36, "text": "프로그래머들이 임시방편으로"}, {"start": 612.36, "end": 615.6400000000001, "text": "지저분한 코드를 덕지덕지 이어 붙이는 겁니다"}, {"start": 615.6400000000001, "end": 616.7600000000001, "text": "나중에 업데이트할 때"}, {"start": 616.7600000000001, "end": 619.12, "text": "게임이 와르르 무너지는 버그가 생기죠"}, {"start": 619.12, "end": 621.8800000000001, "text": "아 그래서 의도를 바탕으로"}, {"start": 621.8800000000001, "end": 626.48, "text": "작업기간, 인력, 데이터량, 그래픽 리소스를 배분해야 하는군요"}, {"start": 626.48, "end": 628.04, "text": "P25에서 말하듯"}, {"start": 628.04, "end": 631.24, "text": "재미나, 잔류, 결제요소는 따로 떼어 놓구요"}, {"start": 631.24, "end": 633.8000000000001, "text": "맞습니다 그렇게 뼈대를 잡았다면"}, {"start": 633.8000000000001, "end": 636.9200000000001, "text": "P26부터는 플레이어의 심장박동인"}, {"start": 636.9200000000001, "end": 638.9200000000001, "text": "핵심 사이클을 설계해야 합니다"}, {"start": 638.9200000000001, "end": 641.12, "text": "유저가 반복하는 루프죠"}, {"start": 641.12, "end": 644.64, "text": "P27을 보면 농장게임은 심고 수확하고"}, {"start": 644.64, "end": 648.28, "text": "롤은 미니언 처치하고 돈 벌어 한타하는 예시가 나와요"}, {"start": 648.28, "end": 650.9200000000001, "text": "네 이 사이클은 초반부터 반복되니까"}, {"start": 650.9200000000001, "end": 653.76, "text": "피로도를 막기 위해 P30에서는"}, {"start": 653.76, "end": 656.72, "text": "컨텐츠를 서서히 배치하라고 조언합니다"}, {"start": 656.72, "end": 658.8, "text": "이걸 더 큰 그림과 연결해 보면"}, {"start": 658.8, "end": 663.72, "text": "좋은 사이클은 본질적 재미, 흐름 유지, 자원 균형이 필수거든요"}, {"start": 663.72, "end": 667.68, "text": "아 타격감을 위해 스톱, 모션 같은 피드백을 주는 것도"}, {"start": 667.68, "end": 669.8, "text": "흐름 유지의 일환이겠네요"}, {"start": 669.8, "end": 674.48, "text": "근데 P30에 나오는 이 자원 균형 파트가 진짜 소름돋더라구요"}, {"start": 674.48, "end": 675.76, "text": "엔진과 데드락"}, {"start": 675.76, "end": 677.12, "text": "기획자들의 악몽이죠"}, {"start": 677.12, "end": 679.04, "text": "엔진은 무한동력인데"}, {"start": 679.04, "end": 682.96, "text": "알을 낳고 그걸 먹으면 무한히 커지는 뱀 비유가 나와요"}, {"start": 682.96, "end": 686.52, "text": "사냥에서 버는 골드가 물량값보다 압도적으로 많아서"}, {"start": 686.52, "end": 688.52, "text": "경제가 박살나는 상황이잖아요"}, {"start": 688.52, "end": 689.52, "text": "맞아요"}, {"start": 689.52, "end": 692.2, "text": "반대로 데드락은 순환 불가 상태입니다"}, {"start": 692.2, "end": 694.9200000000001, "text": "워크래프트3에서 언데드 초보 유저가"}, {"start": 694.9200000000001, "end": 697.36, "text": "실수로 금광 건물을 팔아버린 상황이죠"}, {"start": 697.36, "end": 699.08, "text": "돈을 캐야 건물을 짓는데"}, {"start": 699.08, "end": 702.08, "text": "건물이 없으니 영원히 돈을 못 캐는 거네요"}, {"start": 702.08, "end": 704.0400000000001, "text": "일꾼은 멀뚱멀뚱 서있고"}, {"start": 704.0400000000001, "end": 707.6, "text": "시스템 밸런스가 붕괴되는 이런 위험은 원천 차단해야 합니다"}, {"start": 707.6, "end": 711.2, "text": "와 기획은 거대한 톱니바퀴를 맞추는 거네요"}, {"start": 711.24, "end": 716.4000000000001, "text": "이제 마지막 섹션 p31부터 p52까지 세계관 구축으로 가보겠습니다"}, {"start": 716.4000000000001, "end": 718.72, "text": "메커니즘이 뼈대라면 세계관은 살이죠"}, {"start": 718.72, "end": 721.72, "text": "네 왜 필요한가에 대한 질문부터"}, {"start": 721.72, "end": 727.5600000000001, "text": "p32에서 왜, 어떻게, 결과. 이 세 가시를 질문해야 한다고 하네요"}, {"start": 727.5600000000001, "end": 729.48, "text": "시스템 기획과 병행되지만"}, {"start": 729.48, "end": 732.12, "text": "싱글 게임은 세계관이 선행되기도 하고요"}, {"start": 732.12, "end": 736.6400000000001, "text": "여기서 진짜 흥미로운 게 p34부터 나오는 게임만의 핵심 규칙입니다"}, {"start": 736.6400000000001, "end": 738.72, "text": "아 현실과는 다른 거요?"}, {"start": 738.72, "end": 740.64, "text": "현실에선 노인이 약하지만"}, {"start": 740.64, "end": 744.24, "text": "무역게임에선 깨달음을 얻어 최강의 고수가 되는 거"}, {"start": 744.24, , {"start": 829.64, "end": 832.68, "text": "여러분은 자신도 모르게 무한동력 엔진에 빠져 있나요?"}, {"start": 832.68, "end": 835.0, "text": "아니면 빠져나갈 수 없는 데드락 상태인가요?"}, {"start": 835.0, "end": 838.16, "text": "와 우리의 현실도 누군가 치밀하게 설계한"}, {"start": 838.16, "end": 841.16, "text": "거대한 기획서의 일부일지도 모르겠네요"}, {"start": 841.16, "end": 842.9599999999999, "text": "이거 완전 도발적인 생각이네요"}, {"start": 842.9599999999999, "end": 845.72, "text": "맞습니다 한 번쯤 성찰해볼 만한 주제죠"}, {"start": 845.72, "end": 849.12, "text": "네 청취자 여러분의 다음 기획을 열렬히 응원하면서"}, {"start": 849.12, "end": 852.16, "text": "오늘 저희가 준비한 깊이 있는 탐구는 여기까지입니다"}, {"start": 852.16, "end": 853.8, "text": "함께 해주셔서 감사합니다"}];

let currentSlide = 0;
let isAutoSync = true;
let lastSubIdx = -1;
const audio = document.getElementById('audio');
const playBtn = document.getElementById('play-btn');
const ICON_PLAY  = '<svg width="12" height="14" viewBox="0 0 12 14" fill="none"><path d="M1 1.5L11 7L1 12.5V1.5Z" fill="currentColor"/></svg>';
const ICON_PAUSE = '<svg width="12" height="14" viewBox="0 0 12 14" fill="none"><rect x="1" y="1" width="3.5" height="12" rx="1" fill="currentColor"/><rect x="7.5" y="1" width="3.5" height="12" rx="1" fill="currentColor"/></svg>';
const timeDisplay = document.getElementById('time-display');
const seekBar = document.getElementById('seek-bar');

// 오디오 포함 슬라이드를 시작시간 순으로 정렬한 인덱스 (동기화용)
const audioSlides = SLIDES
    .map((s, i) => ({idx: i, start: s.start, end: s.end, hasAudio: s.hasAudio}))
    .filter(s => s.hasAudio && s.start !== null)
    .sort((a, b) => a.start - b.start);

function init() {
    buildNav();
    buildIndex();
    buildAudioMap();
    showSlide(0);
    audio.addEventListener('timeupdate', onTimeUpdate);
    // 오디오 메타데이터 로드 시 시크바 max 갱신
    audio.addEventListener('loadedmetadata', updateSeekBarMax);
    audio.addEventListener('durationchange', updateSeekBarMax);
    // canplay 이벤트도 대비 (일부 브라우저/포맷에서 loadedmetadata가 늦게 발생)
    audio.addEventListener('canplay', updateSeekBarMax);
    // 슬라이더 드래그 시: 오디오 위치 이동 + 즉시 슬라이드 동기화
    seekBar.addEventListener('input', () => {
        audio.currentTime = seekBar.value;
        isAutoSync = true;
        syncSlideToTime(audio.currentTime);
        updateSubtitle(audio.currentTime);
    });
    // 일시정지 상태에서 seek 완료 시에도 슬라이드 동기화
    audio.addEventListener('seeked', () => {
        syncSlideToTime(audio.currentTime);
        updateTimeDisplay();
        updateSubtitle(audio.currentTime);
    });
}

function updateSeekBarMax() {
    if (audio.duration && isFinite(audio.duration)) {
        seekBar.max = audio.duration;
        updateTimeDisplay();
    }
}

function buildNav() {
    const nav = document.getElementById('slide-nav');
    SLIDES.forEach((slide, i) => {
        const dot = document.createElement('button');
        dot.className = 'nav-dot ' + (slide.hasAudio ? 'has-audio' : 'no-audio');
        dot.textContent = slide.id.replace('P', '');
        dot.title = slide.id + ' — ' + slide.title;
        dot.onclick = () => { isAutoSync = false; showSlide(i); };
        nav.appendChild(dot);
    });
}

function buildIndex() {
    const list = document.getElementById('index-list');
    SLIDES.forEach((slide, i) => {
        const item = document.createElement('div');
        item.className = 'index-item' + (slide.hasAudio ? ' has-audio' : '');
        item.innerHTML = '<span class="idx-id">' + slide.id + '</span><span class="idx-title">' + slide.title + '</span>';
        item.onclick = () => { isAutoSync = false; showSlide(i); };
        list.appendChild(item);
    });
}

function buildAudioMap() {
    const map = document.getElementById('audio-map');
    if (!map) return;
    let prevEnd = 0;
    audioSlides.forEach((s, i) => {
        const slide = SLIDES[s.idx];
        const duration = s.end - s.start;
        // 시간 갭이 있으면 빈 공간 삽입
        if (s.start > prevEnd + 1) {
            const gap = document.createElement('div');
            gap.className = 'map-gap';
            gap.style.flexGrow = (s.start - prevEnd).toFixed(1);
            map.appendChild(gap);
        }
        const seg = document.createElement('div');
        seg.className = 'map-segment';
        seg.dataset.idx = s.idx;
        seg.style.flexGrow = duration.toFixed(1);
        seg.textContent = slide.id;
        seg.title = slide.id + ' — ' + slide.title;
        seg.onclick = () => {
            audio.currentTime = s.start;
            isAutoSync = true;
            syncSlideToTime(s.start);
        };
        map.appendChild(seg);
        prevEnd = s.end;
    });
}

function updateAudioMap(currentIdx) {
    document.querySelectorAll('.map-segment').forEach(seg => {
        seg.classList.toggle('active', parseInt(seg.dataset.idx) === currentIdx);
    });
}

function showSlide(index) {
    if (index < 0 || index >= SLIDES.length) return;
    currentSlide = index;
    const slide = SLIDES[index];
    document.getElementById('slide-id').textContent = slide.id;
    document.getElementById('slide-title').textContent = slide.title;
    const contentEl = document.getElementById('slide-content');
    contentEl.style.animation = 'none';
    contentEl.offsetHeight; // 리플로우 트리거
    contentEl.style.animation = '';
    contentEl.innerHTML = slide.content;
    const badge = document.getElementById('slide-badge');
    if (slide.hasAudio) {
        badge.textContent = '🎵 오디오 포함';
        badge.className = 'badge-audio';
    } else {
        badge.textContent = '📖 교안 전용';
        badge.className = 'badge-no-audio';
    }
    // 네비게이션 도트 활성화
    document.querySelectorAll('.nav-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === index);
    });
    // 인덱스 패널 활성화
    document.querySelectorAll('.index-item').forEach((item, i) => {
        item.classList.toggle('active', i === index);
        if (i === index) item.scrollIntoView({block: 'nearest', behavior: 'smooth'});
    });
    // 오디오 맵 활성화
    updateAudioMap(index);

    window.scrollTo({top: 0, behavior: 'smooth'});
}

// 시간 기반 슬라이드 동기화 (정렬된 audioSlides 사용)
function syncSlideToTime(t) {
    let targetIdx = -1;
    for (let i = audioSlides.length - 1; i >= 0; i--) {
        if (t >= audioSlides[i].start) {
            targetIdx = audioSlides[i].idx;
            break;
        }
    }
    if (targetIdx >= 0 && targetIdx !== currentSlide) {
        showSlide(targetIdx);
    }
}

function onTimeUpdate() {
    const t = audio.currentTime;
    seekBar.value = t;
    updateTimeDisplay();
    updateSubtitle(t);
    if (!isAutoSync) return;
    syncSlideToTime(t);
}

function updateTimeDisplay() {
    const cur = formatTime(audio.currentTime);
    const dur = formatTime(audio.duration || 0);
    timeDisplay.textContent = cur + ' / ' + dur;
}

function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
}

function togglePlay() {
    if (audio.paused) {
        audio.play();
        playBtn.innerHTML = ICON_PAUSE;
        isAutoSync = true;
    } else {
        audio.pause();
        playBtn.innerHTML = ICON_PLAY;
    }
}

function changeSpeed(val) {
    audio.playbackRate = parseFloat(val);
}

function skipTime(sec) {
    audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + sec));
}

document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowLeft') { showSlide(currentSlide - 1); isAutoSync = false; }
    if (e.code === 'ArrowRight') { showSlide(currentSlide + 1); isAutoSync = false; }
});

function updateSubtitle(t) {
    if (typeof TRANSCRIPT === 'undefined' || TRANSCRIPT.length === 0) return;
    const idx = findTranscriptIdx(t);
    if (idx === lastSubIdx) return;
    lastSubIdx = idx;
    const el = document.getElementById('subtitle-text');
    if (el) el.textContent = idx >= 0 ? TRANSCRIPT[idx].text : '';
}

function findTranscriptIdx(t) {
    let lo = 0, hi = TRANSCRIPT.length - 1, result = -1;
    while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (TRANSCRIPT[mid].start <= t) { result = mid; lo = mid + 1; }
        else { hi = mid - 1; }
    }
    if (result >= 0 && t <= TRANSCRIPT[result].end) return result;
    return -1;
}

// 모바일 목차 오버레이
function buildOverlayIndex() {
    const list = document.getElementById('index-overlay-list');
    if (!list) return;
    SLIDES.forEach((slide, i) => {
        const item = document.createElement('div');
        item.className = 'index-item' + (slide.hasAudio ? ' has-audio' : '');
        item.innerHTML = '<span class="idx-id">' + slide.id + '</span><span class="idx-title">' + slide.title + '</span>';
        item.onclick = () => { isAutoSync = false; showSlide(i); closeOverlay(); };
        list.appendChild(item);
    });
}

function openOverlay() {
    const ov = document.getElementById('index-overlay');
    ov.classList.add('open');
    // 현재 슬라이드 하이라이트
    const items = document.querySelectorAll('#index-overlay-list .index-item');
    items.forEach((item, i) => {
        item.classList.toggle('active', i === currentSlide);
        if (i === currentSlide) item.scrollIntoView({block: 'center', behavior: 'smooth'});
    });
}

function closeOverlay() {
    document.getElementById('index-overlay').classList.remove('open');
}

init();
buildOverlayIndex();

</script>
</body>
</html>
